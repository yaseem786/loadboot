<!doctype html><html><head><meta charset="utf-8"><title>LoadBoot splash preview</title>
<style>
  html,body{margin:0;height:100%;background:#05080f;font-family:system-ui,sans-serif}
  .stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(1000px 520px at 50% 34%,#13213f 0%,#0b1220 62%,#070d1a 100%)}
  .inner{display:flex;flex-direction:column;align-items:center;gap:22px}
  .lockup{position:relative;display:flex;align-items:center;gap:14px;padding:8px 12px}
  .arw{height:64px;width:auto;display:block;filter:drop-shadow(0 14px 34px rgba(8,131,247,.5));
    animation:arw 1s cubic-bezier(.16,.9,.3,1.35) both}
  .wm{height:46px;width:auto;display:block;clip-path:inset(0 100% 0 0);
    animation:wipe .7s .55s cubic-bezier(.4,0,.2,1) forwards}
  .shine{position:absolute;inset:0;overflow:hidden;pointer-events:none}
  .shine::after{content:"";position:absolute;top:-20%;bottom:-20%;left:-45%;width:32%;
    background:linear-gradient(100deg,transparent,rgba(255,255,255,.35),transparent);transform:skewX(-18deg);
    animation:shine 1.3s 1.15s ease-out both}
  .tag{font-size:.74rem;font-weight:700;letter-spacing:.26em;text-transform:uppercase;color:#64748b;
    opacity:0;animation:up .6s 1s both}
  .bar{width:170px;height:3px;border-radius:99px;background:rgba(255,255,255,.1);overflow:hidden}
  .bar i{display:block;height:100%;width:40%;border-radius:99px;background:linear-gradient(90deg,#0883F7,#60a5fa);
    animation:slide 1.1s ease-in-out infinite}
  .replay{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#0883F7;color:#fff;
    border:none;border-radius:10px;padding:10px 20px;font-weight:700;cursor:pointer}
  @keyframes arw{0%{opacity:0;transform:translateX(-72px) scale(.78)}55%{opacity:1}100%{opacity:1;transform:translateX(0) scale(1)}}
  @keyframes wipe{0%{clip-path:inset(0 100% 0 0)}100%{clip-path:inset(0 0 0 0)}}
  @keyframes shine{0%{left:-45%}100%{left:135%}}
  @keyframes up{0%{opacity:0;transform:translateY(10px)}100%{opacity:1;transform:translateY(0)}}
  @keyframes slide{0%{transform:translateX(-120%)}100%{transform:translateX(330%)}}
</style></head><body>
<div class="stage"><div class="inner" id="inner">
  <div class="lockup">
    <img class="arw" src="logo-icon-dark.png" alt="">
    <img class="wm" src="logo-text-dark.png" alt="LoadBoot">
    <span class="shine"></span>
  </div>
  <div class="tag">Command Center</div>
  <div class="bar"><i></i></div>
</div></div>
<button class="replay" onclick="var n=document.getElementById('inner');var c=n.cloneNode(true);n.parentNode.replaceChild(c,n);c.id='inner';">Replay animation</button>
</body></html>
