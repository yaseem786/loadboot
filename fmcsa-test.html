<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>FMCSA verify — live test</title>
<style>
*{box-sizing:border-box;font-family:Inter,system-ui,Arial,sans-serif}
body{margin:0;background:#0b1b33;color:#eef3f9;padding:24px}
.card{max-width:560px;margin:0 auto;background:#0f2445;border:1px solid #22406e;border-radius:18px;padding:22px}
h1{font-size:1.15rem;margin:0 0 4px}p{color:#9fb4d6;font-size:.85rem;margin:0 0 16px;line-height:1.5}
label{display:block;font-size:.72rem;color:#9fb4d6;font-weight:700;margin:10px 0 3px}
input{width:100%;border:1px solid #2b4d80;border-radius:10px;padding:11px 12px;font-size:.95rem;background:#0b1e3c;color:#fff}
button{width:100%;background:linear-gradient(135deg,#0e7490,#06b6d4);color:#fff;border:0;border-radius:11px;padding:13px;font-weight:800;font-size:.95rem;cursor:pointer;margin-top:16px}
button:disabled{opacity:.5}
.out{margin-top:16px;font-size:.82rem;line-height:1.6;display:none}
.tag{display:inline-block;padding:3px 10px;border-radius:99px;font-weight:800;font-size:.78rem}
.ok{background:#0e3b23;color:#4ade80}.bad{background:#3b1414;color:#f87171}
pre{background:#0b1e3c;border:1px solid #22406e;border-radius:10px;padding:12px;overflow:auto;font-size:.74rem;color:#cbe0ff;white-space:pre-wrap;word-break:break-word}
.k{color:#7dd3fc}
</style></head><body>
<div class="card">
<h1>FMCSA verify — live test</h1>
<p>Calls the live LoadBoot FMCSA function directly. Enter a real USDOT or MC number, then press Test. Independent of the main site.</p>
<label>USDOT number</label><input id="dot" placeholder="e.g. 80321" inputmode="numeric">
<label>MC number (optional if DOT given)</label><input id="mc" placeholder="e.g. 1234567" inputmode="numeric">
<button id="btn">Test verify</button>
<div class="out" id="out"></div>
</div>
<script>
var URL="https://rwscphuhpjoudvljvmdk.supabase.co/functions/v1/fmcsa-verify";
var KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ3c2NwaHVocGpvdWR2bGp2bWRrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0Mzc3NjMsImV4cCI6MjA5ODAxMzc2M30.xE3yJHNv-PJJ2HqlCv_Psj83n5IYaNQY1AaV6p6hX5g";
var btn=document.getElementById('btn'),out=document.getElementById('out');
btn.onclick=async function(){
  var dot=document.getElementById('dot').value.trim(), mc=document.getElementById('mc').value.trim();
  if(!dot&&!mc){out.style.display='block';out.innerHTML='<span class="tag bad">Enter a DOT or MC first</span>';return;}
  btn.disabled=true;btn.textContent='Testing…';out.style.display='block';out.innerHTML='Calling FMCSA function…';
  var t0=Date.now();
  try{
    var r=await fetch(URL,{method:'POST',headers:{'Content-Type':'application/json','apikey':KEY,'Authorization':'Bearer '+KEY},body:JSON.stringify({dot:dot||null,mc:mc||null})});
    var took=Date.now()-t0;
    var txt=await r.text(); var j; try{j=JSON.parse(txt)}catch(e){j={raw:txt}}
    var okTag=(r.ok&&j.ok)?'<span class="tag ok">✓ WORKS (HTTP '+r.status+', '+took+'ms)</span>':'<span class="tag bad">Problem (HTTP '+r.status+', '+took+'ms)</span>';
    var carr=j.carrier?('<div style="margin-top:8px"><span class="k">Legal name:</span> '+(j.carrier.legalName||'—')+'<br><span class="k">DOT:</span> '+(j.carrier.dotNumber||'—')+'<br><span class="k">Authority:</span> '+(j.carrier.authority||'—')+'<br><span class="k">Source:</span> '+(j.source||'—')+'</div>'):'';
    out.innerHTML=okTag+carr+'<div style="margin-top:10px"><span class="k">Full response:</span></div><pre>'+JSON.stringify(j,null,2)+'</pre>';
  }catch(e){
    out.innerHTML='<span class="tag bad">Network error</span><pre>'+(e&&e.message||e)+'</pre>';
  }
  btn.disabled=false;btn.textContent='Test verify';
};
</script>
</body></html>
