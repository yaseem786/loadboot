<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LoadBoot — Carrier OS (Onboarding · Review · Marketplace)</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#070b14;--bg2:#0a1020;--panel:rgba(255,255,255,.045);--panel2:rgba(255,255,255,.07);
  --bd:rgba(255,255,255,.09);--bd2:rgba(255,255,255,.16);
  --ink:#eaf1fb;--ink2:#c3d1e6;--muted:#7f92b3;--faint:#5b6b8a;
  --acc:#3b9dff;--acc2:#4EA6F9;--accd:#0b6fe0;--orange:#FC5305;--orange2:#f9a86b;
  --ok:#34d399;--okbg:rgba(52,211,153,.13);--warn:#fbbf24;--warnbg:rgba(251,191,36,.13);--bad:#f87171;--badbg:rgba(248,113,113,.13);
  --glow:0 0 0 1px rgba(8,131,247,.35),0 10px 40px -10px rgba(8,131,247,.45);
  --grad:linear-gradient(135deg,#0883F7,#4EA6F9);--gradd:linear-gradient(135deg,#0b6fe0,#0883F7);
  --mono:'JetBrains Mono',ui-monospace,monospace;
}
*{box-sizing:border-box;font-family:Inter,system-ui,Arial,sans-serif;-webkit-tap-highlight-color:transparent}
html,body{margin:0}
body{background:
  radial-gradient(1000px 500px at 80% -10%,rgba(252,83,5,.06),transparent 60%),
  radial-gradient(900px 500px at 0% 0%,rgba(8,131,247,.13),transparent 55%),
  var(--bg);color:var(--ink);font-size:15px;line-height:1.5;min-height:100vh}
button{font-family:inherit;cursor:pointer;border:0}
input,select,textarea{font-family:inherit;font-size:1rem;color:var(--ink)}
select.inp option,.filters select option,select option{background:#0d1526;color:var(--ink)}
::-webkit-scrollbar{height:8px;width:8px}::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:9px}
.mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
/* appbar */
.appbar{position:sticky;top:0;z-index:50;background:rgba(7,11,20,.72);backdrop-filter:blur(18px);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;padding:12px 18px;gap:12px;flex-wrap:wrap}
.logo{font-weight:900;font-size:1.3rem;letter-spacing:-.5px;display:flex;align-items:center;gap:9px}
.logo .l{color:#dbe7fb}.logo .b{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.logo .dot{width:11px;height:11px;border-radius:3px;background:var(--grad);display:inline-block;transform:rotate(45deg);box-shadow:0 0 14px rgba(59,157,255,.8)}
.roles{display:flex;gap:3px;background:rgba(255,255,255,.05);padding:4px;border-radius:13px;border:1px solid var(--bd)}
.roles button{background:transparent;color:var(--muted);font-weight:800;font-size:.8rem;padding:8px 14px;border-radius:9px;transition:.18s}
.roles button.on{background:var(--grad);color:#04121f;box-shadow:0 8px 22px -8px rgba(59,157,255,.7)}
.stage{max-width:1140px;margin:0 auto;padding:20px 16px 130px}
.fade{animation:fade .45s ease}@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.slidein{animation:sl .4s cubic-bezier(.2,.7,.3,1)}@keyframes sl{from{opacity:0;transform:translateX(26px)}to{opacity:1;transform:none}}
/* surfaces */
.card{background:var(--panel);border:1px solid var(--bd);border-radius:20px;padding:22px;backdrop-filter:blur(12px);box-shadow:0 30px 60px -40px rgba(0,0,0,.9)}
.h1{font-size:1.55rem;font-weight:900;letter-spacing:-.6px;margin:0 0 4px}
.sub{color:var(--muted);font-size:.92rem;margin:0}
.btn{background:var(--grad);color:#05131f;font-weight:800;border-radius:13px;padding:13px 22px;font-size:.95rem;box-shadow:0 14px 30px -12px rgba(59,157,255,.65);transition:.18s;letter-spacing:.01em}
.btn:hover{transform:translateY(-1px);box-shadow:0 18px 40px -12px rgba(59,157,255,.8)}
.btn.ghost{background:rgba(255,255,255,.06);color:var(--ink);box-shadow:none;border:1px solid var(--bd2)}
.btn.green{background:linear-gradient(135deg,#34d399,#0ea5a5);color:#052117}
.btn.red{background:linear-gradient(135deg,#f87171,#e0533f);color:#2a0808}
.btn.dis{background:rgba(255,255,255,.06);color:var(--faint);box-shadow:none;cursor:not-allowed;transform:none;border:1px solid var(--bd)}
.btn.sm{padding:8px 14px;font-size:.82rem}.btn.wide{width:100%;text-align:center}
.pill{display:inline-flex;align-items:center;gap:5px;padding:4px 11px;border-radius:99px;font-size:.72rem;font-weight:800}
.pill.ok{background:var(--okbg);color:var(--ok)}.pill.bad{background:var(--badbg);color:var(--bad)}
.pill.warn{background:var(--warnbg);color:var(--warn)}.pill.info{background:rgba(59,157,255,.14);color:var(--acc)}.pill.gray{background:rgba(255,255,255,.06);color:var(--muted)}
.verified{display:inline-flex;align-items:center;gap:4px;background:var(--okbg);color:var(--ok);font-weight:800;font-size:.66rem;padding:3px 9px;border-radius:99px;border:1px solid rgba(52,211,153,.3)}
.tag{display:inline-flex;align-items:center;gap:4px;background:rgba(59,157,255,.12);color:var(--acc);font-weight:800;font-size:.64rem;padding:3px 8px;border-radius:7px;letter-spacing:.05em;text-transform:uppercase}
/* hero */
.hero{position:relative;overflow:hidden;border:1px solid var(--bd);border-radius:22px;padding:28px;margin-bottom:18px;background:linear-gradient(120deg,rgba(59,157,255,.16),rgba(34,211,238,.06) 60%,transparent),var(--bg2)}
.hero:after{content:"";position:absolute;right:-80px;top:-80px;width:280px;height:280px;background:radial-gradient(circle,rgba(34,211,238,.4),transparent 70%);filter:blur(10px)}
.hero h2{margin:0 0 6px;font-size:1.55rem;font-weight:900}.hero p{margin:0;color:var(--ink2);font-size:.95rem;max-width:64ch;position:relative}
/* strip */
.strip{display:flex;align-items:center;gap:22px;flex-wrap:wrap;border:1px solid var(--bd);border-radius:20px;padding:22px;margin-bottom:18px;background:var(--panel);backdrop-filter:blur(12px)}
.ring{--p:0;width:100px;height:100px;border-radius:50%;flex:none;display:grid;place-items:center;background:conic-gradient(var(--acc) calc(var(--p)*1%),rgba(255,255,255,.08) 0);box-shadow:0 0 30px -6px rgba(59,157,255,.5)}
.ring i{width:78px;height:78px;border-radius:50%;background:var(--bg2);display:grid;place-items:center;font-weight:900;font-size:1.3rem;font-style:normal;font-family:var(--mono);color:#dbe7fb}
.strip .txt{flex:1;min-width:200px}.strip .txt h3{margin:0 0 4px;font-size:1.18rem;font-weight:900}.strip .txt p{margin:0;color:var(--muted);font-size:.9rem}
/* locked board */
.locked{position:relative;border:1px dashed var(--bd2);border-radius:18px;overflow:hidden}
.locked .blurwrap{filter:blur(5px);opacity:.5;pointer-events:none;padding:16px}
.locked .lock{position:absolute;inset:0;display:grid;place-items:center;text-align:center}
.locked .lock .in{background:rgba(10,16,32,.8);backdrop-filter:blur(6px);border:1px solid var(--bd);border-radius:14px;padding:18px 24px}
.loadrow{display:flex;justify-content:space-between;gap:12px;padding:13px;border:1px solid var(--bd);border-radius:13px;margin-bottom:8px;background:var(--panel)}
.loadrow b{color:var(--ink)}
/* forms */
.enter{max-width:540px;margin:14px auto}
.field{margin-bottom:14px}
.field label{display:block;font-size:.7rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.field .opt{color:var(--faint);font-weight:700;text-transform:none;letter-spacing:0}
.inp{width:100%;border:1.5px solid var(--bd2);border-radius:12px;padding:12px 14px;background:rgba(255,255,255,.04);transition:.15s}
.inp::placeholder{color:var(--faint)}
.inp:focus{outline:0;border-color:var(--acc);box-shadow:0 0 0 4px rgba(59,157,255,.18);background:rgba(59,157,255,.06)}
textarea.inp{resize:vertical;min-height:70px}
select.inp option{background:var(--bg2)}
/* wizard */
.wiz{display:grid;grid-template-columns:250px 1fr;gap:18px;align-items:start}
.rail{position:sticky;top:78px}
.rail .card{padding:14px}
.rail .step{display:flex;align-items:center;gap:10px;padding:8px 9px;border-radius:11px;font-size:.84rem;font-weight:700;color:var(--muted);cursor:pointer;transition:.15s}
.rail .step:hover{background:rgba(255,255,255,.05)}
.rail .step.on{background:rgba(59,157,255,.14);color:var(--ink)}.rail .step.done{color:var(--ink2)}
.rail .num{width:25px;height:25px;border-radius:50%;flex:none;display:grid;place-items:center;font-size:.74rem;font-weight:900;background:rgba(255,255,255,.07);color:var(--muted);font-family:var(--mono)}
.rail .step.on .num{background:var(--grad);color:#05131f}.rail .step.done .num{background:var(--okbg);color:var(--ok)}
.railbar{height:6px;background:rgba(255,255,255,.08);border-radius:99px;margin:10px 6px 4px;overflow:hidden}
.railbar i{display:block;height:100%;background:var(--grad);border-radius:99px;transition:width .4s}
.railpct{text-align:center;font-size:.72rem;font-weight:800;color:var(--muted);font-family:var(--mono)}
.mstep{display:none}
.wpanel{min-height:360px}
.wtitle{display:flex;align-items:center;gap:10px;font-size:1.26rem;font-weight:900;margin:0 0 3px}
.wsub{color:var(--muted);font-size:.88rem;margin:0 0 16px}
.wnav{display:flex;justify-content:space-between;gap:10px;margin-top:22px;padding-top:16px;border-top:1px solid var(--bd)}
/* profile detail (dark) */
.cols{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.box{border:1px solid var(--bd);border-radius:15px;padding:16px;background:var(--panel)}
.box h3{margin:0 0 10px;font-size:.96rem;display:flex;align-items:center;gap:8px}
.f{padding:8px 0;border-bottom:1px solid var(--bd)}.f:last-child{border-bottom:0}
.f .k{font-size:.66rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:800;margin-bottom:2px}
.f .v{font-size:.95rem;font-weight:600;color:var(--ink)}
.sec-h{font-size:1rem;font-weight:800;margin:16px 0 12px;color:var(--ink)}
.big{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:8px}
.m{background:var(--panel);border:1px solid var(--bd);border-radius:15px;padding:15px;text-align:center;position:relative;overflow:hidden}
.m:before{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(59,157,255,.08),transparent 60%)}
.m b{display:block;font-size:1.55rem;font-weight:900;font-family:var(--mono);background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;position:relative}
.m span{font-size:.62rem;color:var(--muted);font-weight:800;letter-spacing:.05em;position:relative}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{background:rgba(59,157,255,.1);color:#9fd0ff;border:1px solid rgba(59,157,255,.25);border-radius:99px;padding:6px 12px;font-size:.8rem;font-weight:700}
.chip.tog{cursor:pointer;user-select:none}.chip.sel{background:var(--grad);color:#05131f;border-color:transparent}
.chip.warn{background:var(--warnbg);color:var(--warn);border-color:rgba(251,191,36,.3)}
.chip.bad{background:var(--badbg);color:var(--bad);border-color:rgba(248,113,113,.3)}
.chip.ok{background:var(--okbg);color:var(--ok);border-color:rgba(52,211,153,.3)}
table{width:100%;border-collapse:collapse;font-size:.84rem}
th{text-align:left;color:var(--muted);font-size:.64rem;text-transform:uppercase;letter-spacing:.05em;padding:8px 10px;border-bottom:1px solid var(--bd2)}
td{padding:9px 10px;border-bottom:1px solid var(--bd);color:var(--ink2)}
.pill2{display:inline-block;padding:3px 9px;border-radius:99px;font-size:.7rem;font-weight:800}
.pill2.ok{background:var(--okbg);color:var(--ok)}.pill2.bad{background:var(--badbg);color:var(--bad)}.pill2.warn{background:var(--warnbg);color:var(--warn)}
.pcard{border:1px solid var(--bd);border-radius:15px;padding:16px;margin-bottom:12px;background:var(--panel)}
.pcard .bar{height:4px;background:var(--grad);border-radius:15px 15px 0 0;margin:-16px -16px 14px}
.rowline{display:flex;justify-content:space-between;gap:12px;padding:7px 0;border-bottom:1px solid var(--bd);font-size:.9rem}
.insp{display:flex;justify-content:space-between;align-items:center;border:1px solid var(--bd);border-radius:12px;padding:12px 14px;margin-bottom:10px;gap:12px;flex-wrap:wrap;background:var(--panel)}
.insp .l{font-weight:800}
.cmp{display:flex;gap:12px;flex-wrap:wrap}
.cmp .c{flex:1;min-width:150px;border:1px solid var(--bd);border-radius:12px;padding:14px;text-align:center;background:var(--panel)}
.cmp .c b{font-size:1.5rem;font-weight:900;display:block;font-family:var(--mono)}
.empty{text-align:center;color:var(--muted);padding:36px;font-size:.92rem}
.above{color:var(--bad);font-weight:700;font-size:.76rem}.below{color:var(--ok);font-weight:700;font-size:.76rem}
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--bd);overflow:auto;margin-bottom:16px}
.tab{padding:12px 14px;font-weight:700;font-size:.86rem;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
.tab.on{color:var(--acc);border-bottom-color:var(--acc)}
/* editable + upload */
.editcard{border:1.5px solid rgba(59,157,255,.3);background:rgba(59,157,255,.06);border-radius:15px;padding:15px 16px;margin-top:12px}
.editcard .lab{font-weight:900;color:#9fd0ff;font-size:.8rem;display:flex;align-items:center;gap:7px;margin-bottom:10px}
.uploader{border:2px dashed var(--bd2);border-radius:14px;padding:20px;text-align:center;background:rgba(255,255,255,.03);cursor:pointer;transition:.15s}
.uploader:hover{border-color:var(--acc);background:rgba(59,157,255,.06)}.uploader.has{border-style:solid;border-color:var(--ok);background:var(--okbg)}
.uploader .big2{font-size:1.5rem}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.sigpad{border:1.5px solid var(--bd2);border-radius:12px;background:repeating-linear-gradient(rgba(255,255,255,.02),rgba(255,255,255,.02) 30px,rgba(255,255,255,.05) 31px);height:110px;display:grid;place-items:center;color:var(--faint)}
.signame{font-family:'Segoe Script','Brush Script MT',cursive;font-size:2rem;color:var(--acc2)}
.chk{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1px solid var(--bd);border-radius:13px;margin-bottom:9px;background:var(--panel)}
.chk .ic{width:28px;height:28px;border-radius:50%;flex:none;display:grid;place-items:center;font-weight:900}
.chk .ic.y{background:var(--okbg);color:var(--ok)}.chk .ic.n{background:var(--badbg);color:var(--bad)}
.chk .t{flex:1}.chk .t b{display:block}.chk .t span{font-size:.8rem;color:var(--muted)}
.policy{display:flex;gap:11px;align-items:flex-start;padding:11px 13px;border:1.5px solid var(--bd);border-radius:12px;margin-bottom:8px;cursor:pointer;transition:.15s}
.policy:hover{border-color:var(--bd2)}.policy.on{border-color:var(--ok);background:var(--okbg)}
.policy .cb{width:22px;height:22px;border-radius:7px;border:2px solid var(--bd2);flex:none;display:grid;place-items:center;font-weight:900;color:#05131f;transition:.15s;margin-top:1px}
.policy.on .cb{background:var(--ok);border-color:var(--ok)}
.policy .pt{font-size:.88rem;font-weight:600;color:var(--ink2)}
.acc{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--bd)}
.acc .an{flex:1;font-size:.88rem;font-weight:600}.acc .au{color:var(--muted);font-size:.76rem;width:96px;text-align:right}
.acc input{width:112px;border:1.5px solid var(--bd2);border-radius:9px;padding:8px 10px;text-align:right;background:rgba(255,255,255,.04)}
/* banners */
.banner{border-radius:16px;padding:18px 20px;display:flex;gap:14px;align-items:center;margin-bottom:16px;border:1px solid var(--bd)}
.banner .em{font-size:1.9rem}
.banner.rev{background:linear-gradient(120deg,rgba(59,157,255,.18),rgba(34,211,238,.06));}
.banner.ok{background:var(--okbg);border-color:rgba(52,211,153,.3)}.banner.bad{background:var(--badbg);border-color:rgba(248,113,113,.3)}
/* list cards */
.qcard{display:flex;align-items:center;gap:14px;padding:15px;border:1px solid var(--bd);border-radius:16px;margin-bottom:11px;background:var(--panel);cursor:pointer;transition:.18s}
.qcard:hover{border-color:var(--bd2);transform:translateX(3px);box-shadow:var(--glow)}
.qcard .av{width:48px;height:48px;border-radius:13px;flex:none;background:var(--gradd);color:#eaf1fb;display:grid;place-items:center;font-weight:900;font-size:1.05rem}
.qcard .info{flex:1;min-width:0}.qcard .info b{font-size:1rem}.qcard .info .meta{color:var(--muted);font-size:.82rem;margin-top:2px}
.subnav{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.subnav button{background:var(--panel);border:1.5px solid var(--bd);color:var(--muted);font-weight:800;padding:9px 15px;border-radius:12px;font-size:.85rem;transition:.15s}
.subnav button:hover{border-color:var(--bd2);color:var(--ink)}
.subnav button.on{background:var(--grad);color:#05131f;border-color:transparent}
.count{display:inline-grid;place-items:center;min-width:20px;height:20px;padding:0 6px;border-radius:99px;background:var(--bad);color:#2a0808;font-size:.7rem;font-weight:900;margin-left:6px}
/* filters */
.filters{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:16px;padding:14px;border:1px solid var(--bd);border-radius:15px;background:var(--panel)}
.filters b{color:var(--ink);font-size:.8rem}
.filters select,.filters input{border:1.5px solid var(--bd2);border-radius:11px;padding:9px 12px;background:rgba(255,255,255,.04)}
/* load card (marketplace) */
.lcard{border:1px solid var(--bd);border-radius:16px;padding:16px;margin-bottom:11px;background:var(--panel);transition:.18s}
.lcard:hover{border-color:var(--bd2);box-shadow:var(--glow)}
.lcard .lane{font-size:1.05rem;font-weight:900;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.lcard .meta{color:var(--muted);font-size:.82rem;margin-top:3px}
.lcard .rate{font-family:var(--mono);font-size:1.35rem;font-weight:800;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.lcard .rpm{font-size:.72rem;color:var(--muted);font-family:var(--mono)}
.lhead{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
/* modal */
.modal{position:fixed;inset:0;background:rgba(3,6,14,.7);backdrop-filter:blur(6px);z-index:100;display:grid;place-items:start center;padding:24px 18px;overflow:auto;animation:fade .2s}
.modal .box{background:var(--bg2);border:1px solid var(--bd2);border-radius:20px;padding:24px;max-width:580px;width:100%;box-shadow:0 40px 90px -20px rgba(0,0,0,.9)}
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--bd2);color:var(--ink);padding:13px 22px;border-radius:99px;font-weight:700;font-size:.9rem;z-index:120;box-shadow:0 16px 40px -14px rgba(0,0,0,.8);animation:fade .25s}
.load{text-align:center;padding:56px 20px;color:var(--muted)}
.spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,.12);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
/* packet (PDF look) */
.packet{background:#f4f7fb;color:#0f1e36;border-radius:12px;padding:22px;font-size:.85rem}
.packet h4{margin:0 0 3px;color:#123a6b}.packet .prow{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #e6edf5}
.packet .k{color:#7089ab;font-weight:700}
@media(max-width:860px){
  .wiz{grid-template-columns:1fr}.rail{display:none}
  .mstep{display:block;position:sticky;top:58px;z-index:20;background:rgba(7,11,20,.9);backdrop-filter:blur(10px);padding:10px 0 8px}
  .mstep .bar{height:6px;background:rgba(255,255,255,.08);border-radius:99px;overflow:hidden}.mstep .bar i{display:block;height:100%;background:var(--grad);transition:width .4s}
  .mstep .lbl{display:flex;justify-content:space-between;margin-top:7px;font-size:.78rem;font-weight:800;color:var(--muted)}
  .cols,.grid2,.grid3{grid-template-columns:1fr}.big{grid-template-columns:1fr 1fr}
  .h1{font-size:1.28rem}.stage{padding:16px 13px 130px}
}
@media(max-width:480px){.roles button{padding:8px 10px;font-size:.72rem}.logo{font-size:1.12rem}}
</style></head>
<body>
<div class="appbar">
  <div class="logo"><span class="dot"></span><span class="l">load</span><span class="b">boot</span></div>
  <div class="roles">

/* AVAILABLE LOADS (marketplace) with filters */
function carrierAvailable(){
  if(!S.market.length)seedMarket();
  var fo=(S.cfOrigin||'').toUpperCase(),fd=(S.cfDest||'').toUpperCase(),fe=S.cfEquip||'',fr=parseFloat(S.cfRpm)||0;
  var loads=S.market.filter(function(l){
    var oo=!fo||l.oState.toUpperCase()===fo||l.origin.toUpperCase().indexOf(fo)>=0;
    var dd=!fd||l.dState.toUpperCase()===fd||l.dest.toUpperCase().indexOf(fd)>=0;
    var ee=!fe||l.equip===fe;var rpm=l.miles?l.rate/l.miles:0;var rr=!fr||rpm>=fr;
    return oo&&dd&&ee&&rr;
  });
  var eqOpts=['<option value="">Any equipment</option>'].concat(EQUIP.map(function(e){return '<option'+(fe===e?' selected':'')+'>'+e+'</option>';})).join('');
  var filters='<div class="filters"><b>Filter loads:</b>'
    +'<input placeholder="Origin (city/ST)" value="'+esc(S.cfOrigin||'')+'" oninput="S.cfOrigin=this.value" onkeydown="if(event.key===\'Enter\')render()" style="width:150px">'
    +'<input placeholder="Dest (city/ST)" value="'+esc(S.cfDest||'')+'" oninput="S.cfDest=this.value" onkeydown="if(event.key===\'Enter\')render()" style="width:150px">'
    +'<select onchange="S.cfEquip=this.value;render()">'+eqOpts+'</select>'
    +'<input class="mono" placeholder="Min $/mi" value="'+esc(S.cfRpm||'')+'" oninput="S.cfRpm=this.value" onkeydown="if(event.key===\'Enter\')render()" style="width:110px">'
    +'<button class="btn sm" onclick="render()">Apply</button>'+((fo||fd||fe||fr)?'<button class="btn sm ghost" onclick="S.cfOrigin=\'\';S.cfDest=\'\';S.cfEquip=\'\';S.cfRpm=\'\';render()">Clear</button>':'')+'</div>';
  var list=loads.length?loads.map(function(l){var rpm=l.miles?(l.rate/l.miles).toFixed(2):'—';var match=S.custom.equip.indexOf(l.equip)>=0;
    return '<div class="lcard"><div class="lhead"><div><div class="lane">'+esc(l.origin)+' <span style="color:var(--acc)">→</span> '+esc(l.dest)+(match?' <span class="verified">✔ matches your equipment</span>':'')+'</div><div class="meta">'+esc(l.equip)+' · '+esc(l.weight)+' lbs · '+esc(l.miles)+' mi · '+esc(l.commodity)+'</div><div class="meta">Pickup '+esc(l.pickup)+' · '+(l.src==='LoadBoot Direct'?'<span class="tag">LoadBoot Direct</span>':'Broker: '+esc(l.src))+'</div></div><div style="text-align:right"><div class="rate">'+money(l.rate)+'</div><div class="rpm">$'+rpm+'/mi</div><button class="btn sm" style="margin-top:8px" onclick="bookMarket(\''+l.id+'\')">Book load</button></div></div></div>';}).join(''):'<div class="card"><div class="empty">🔍 No loads match your filter. Try clearing filters.</div></div>';
  stage.innerHTML=carrierSubnav()+'<h1 class="h1">Available Loads</h1><p class="sub">Open marketplace — LoadBoot Direct + broker loads. Filter to your lanes & rate, then book. Direct offers made to you appear in <b>My Loads</b>.</p>'+filters+'<div>'+list+'</div>';
}
window.bookMarket=function(id){var l=S.market.filter(function(x){return x.id===id;})[0];if(!l)return;
  var cl={id:'ld_'+Date.now(),carrierName:S.fmcsa.c.legal_name,broker:l.src,origin:l.origin,dest:l.dest,equip:l.equip,weight:l.weight,miles:l.miles,commodity:l.commodity,rate:l.rate,pickup:l.pickup,delivery:l.delivery||'TBD',notes:'',accessorials:(S.custom.access||ACCESSORIALS),policies:POLICIES.slice(),cstatus:'forwarded',carrierAgree:{},booked:true};
  S.carrierLoads.unshift(cl);S.market=S.market.filter(function(x){return x.id!==id;});S.carrierSub='loads';S.viewLoad=cl.id;render();toast('Load reserved — agree to policies to confirm booking');
};
/* MY LOADS: direct offers + booked */
function carrierLoads(){
  var mine=S.carrierLoads;
  var list=mine.length?mine.map(function(l){var badge=l.cstatus==='forwarded'?'<span class="pill warn">New offer · action needed</span>':l.cstatus==='accepted'?'<span class="pill ok">'+(l.booked?'Booked':'Accepted')+'</span>':'<span class="pill bad">Declined</span>';
    return '<div class="qcard" onclick="openCarrierLoad(\''+l.id+'\')"><div class="av">📦</div><div class="info"><b>'+esc(l.origin)+' → '+esc(l.dest)+'</b><div class="meta">'+esc(l.equip)+' · '+esc(l.weight)+' lbs · '+money(l.rate)+' · via '+esc(l.broker)+'</div></div>'+badge+'</div>';}).join(''):'<div class="card"><div class="empty">📭 No loads yet.<br><span style="font-size:.85rem">Book from Available Loads, or wait for a broker\'s direct offer (routed via CC dispatch).</span></div></div>';
  stage.innerHTML=carrierSubnav()+'<h1 class="h1">My Loads</h1><p class="sub">Direct offers made to you (via dispatch) and loads you\'ve booked. Review terms, agree to policies, then accept.</p><div style="margin-top:14px">'+list+'</div>';
}
window.openCarrierLoad=function(id){S.viewLoad=id;render();};
function carrierLoadDetail(l){
  var acc=l.accessorials.map(function(a){return '<div class="acc"><div class="an">'+esc(a[0])+'</div><div class="au">'+esc(a[1])+'</div><div class="mono" style="width:110px;text-align:right;font-weight:800;color:var(--ink)">'+(Number(a[2])?'$'+esc(a[2]):'—')+'</div></div>';}).join('');
  var pol=l.policies.map(function(p,i){var on=(l.carrierAgree||{})[i];return '<div class="policy'+(on?' on':'')+'" onclick="toggleCPolicy(\''+l.id+'\','+i+')"><div class="cb">'+(on?'✓':'')+'</div><div class="pt">'+esc(p)+'</div></div>';}).join('');
  var allAgreed=l.policies.every(function(p,i){return (l.carrierAgree||{})[i];});
  var actions;
  if(l.cstatus==='forwarded'){actions='<div class="wnav"><div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn red" onclick="declineLoad(\''+l.id+'\')">Decline</button><button class="btn ghost" onclick="openCounter(\''+l.id+'\')">↩ Counter rate</button></div>'+(allAgreed?'<button class="btn green" onclick="acceptLoad(\''+l.id+'\')">✓ Agree & Accept load</button>':'<button class="btn dis">Tick all policies</button>')+'</div>'+(l.counter&&!l.counterApproved?'<div class="banner" style="margin-top:12px;background:rgba(251,191,36,.1)"><div class="em">↩</div><div><b>Counter sent: '+money(l.counter)+'</b><div style="color:var(--muted);font-size:.85rem">Awaiting broker approval — you can still accept at the posted rate meanwhile.</div></div></div>':'')+(l.counterApproved?'<div class="banner ok" style="margin-top:12px"><div class="em">✓</div><div><b style="color:var(--ok)">Broker approved your rate: '+money(l.rate)+'</b><div style="color:var(--muted);font-size:.85rem">Tick policies & accept to book at the new rate.</div></div></div>':'');}
  else if(l.cstatus==='accepted'){var trip=l.trip||'accepted';var tripBtn=trip==='delivered'?'<span class="pill ok" style="align-self:center">✓ Delivered · POD ready</span>':trip==='in_transit'?'<button class="btn green" onclick="advanceTrip(\''+l.id+'\',\'delivered\')">📦 Mark delivered</button>':'<button class="btn" onclick="advanceTrip(\''+l.id+'\',\'in_transit\')">🚚 Start trip</button>';actions='<div class="wnav"><button class="btn red" onclick="openEmergency(\''+l.id+'\')">🚨 Emergency</button>'+tripBtn+'</div>'+(l.emergency?'<div class="banner bad" style="margin-top:12px"><div class="em">🚨</div><div><b style="color:var(--bad)">Emergency reported — '+esc(l.emergency.cat)+'</b><div style="color:var(--ink2);font-size:.85rem">Broker & dispatch notified '+esc(l.emergency.at)+'.'+(l.emergency.reschedule?' Proposed new delivery: <b>'+esc(l.emergency.reschedule)+'</b> — awaiting broker approval.':'')+' Verified emergencies carry no on-time penalty.</div></div></div>':'');}
  else{actions='<div class="wnav"><span></span><span class="pill bad" style="align-self:center">You declined</span></div>';}
  stage.className='stage fade';
  stage.innerHTML='<button class="btn ghost" onclick="S.viewLoad=null;cSub(\'loads\')">← My Loads</button><div class="card" style="margin-top:14px"><div class="hero" style="margin:0 0 16px"><div class="tag">'+(l.booked?'Booked load':'Direct offer')+'</div><h2 style="margin-top:8px;font-size:1.3rem">'+esc(l.origin)+' → '+esc(l.dest)+'</h2><p>'+esc(l.equip)+' · '+esc(l.commodity)+' · '+esc(l.weight)+' lbs · '+esc(l.miles)+' mi</p><div class="rate" style="font-size:1.9rem;margin-top:8px">'+money(l.rate)+' <span style="font-size:.8rem;font-weight:700;color:var(--muted)">line haul · $'+(l.miles?(l.rate/l.miles).toFixed(2):'—')+'/mi</span></div></div>'
    +'<div class="grid3">'+F('Pickup',l.pickup)+F('Delivery',l.delivery)+F('Source',l.broker)+'</div>'+(l.notes?'<div class="box" style="margin-top:12px"><h3>📝 Instructions</h3><div style="font-size:.9rem">'+esc(l.notes)+'</div></div>':'')
    +'<div class="sec-h">💵 Accessorial Rates</div><div class="box">'+acc+'</div><div class="sec-h">📋 Required policies — tick each to agree</div>'+pol+actions+'</div>';
}
window.toggleCPolicy=function(id,i){var l=S.carrierLoads.filter(function(x){return x.id===id;})[0];if(!l)return;l.carrierAgree=l.carrierAgree||{};l.carrierAgree[i]=!l.carrierAgree[i];carrierLoadDetail(l);};
window.acceptLoad=function(id){var l=S.carrierLoads.filter(function(x){return x.id===id;})[0];if(!l)return;l.cstatus='accepted';var bl=S.brokerLoads.filter(function(x){return x.id===id;})[0];if(bl)bl.status='accepted';S.viewLoad=null;cSub('loads');toast('Load accepted 🎉 Rate confirmation generated');};
window.declineLoad=function(id){var l=S.carrierLoads.filter(function(x){return x.id===id;})[0];if(!l)return;l.cstatus='declined';var bl=S.brokerLoads.filter(function(x){return x.id===id;})[0];if(bl)bl.status='declined';S.viewLoad=null;cSub('loads');toast('Load declined');};
window.advanceTrip=function(id,to){var l=S.carrierLoads.filter(function(x){return x.id===id;})[0];if(!l)return;l.trip=to;var bl=S.brokerLoads.filter(function(x){return x.id===id;})[0];if(bl)bl.status=to;carrierLoadDetail(l);toast(to==='in_transit'?'🚚 Trip started — broker tracking live':'📦 Delivered — POD & settlement ready');};
window.openCounter=function(id){var l=S.carrierLoads.filter(function(x){return x.id===id;})[0];if(!l)return;showModal('<h3 style="margin:0 0 4px">↩ Counter the rate</h3><p class="sub" style="margin-bottom:12px">Posted rate is '+money(l.rate)+' ($'+(l.miles?(l.rate/l.miles).toFixed(2):'—')+'/mi). Propose your rate — it goes to the broker for approval.</p><div class="field"><label>Your counter ($)</label><input class="inp mono" id="co-amt" inputmode="numeric" placeholder="'+(l.rate+150)+'"></div><div class="wnav" style="border:0"><button class="btn ghost" onclick="closeModal()">Cancel</button><button class="btn" onclick="submitCounter(\''+id+'\')">Send counter</button></div>');};
window.submitCounter=function(id){var v=(document.getElementById('co-amt')||{}).value||'';var amt=Number(String(v).replace(/[^0-9.]/g,''))||0;if(!amt){toast('Enter a counter amount');return;}var l=S.carrierLoads.filter(function(x){return x.id===id;})[0];if(l){l.counter=amt;l.counterApproved=false;}var bl=S.brokerLoads.filter(function(x){return x.id===id;})[0];if(bl){bl.counter=amt;bl.counterApproved=false;}closeModal();if(l)carrierLoadDetail(l);toast('↩ Counter sent to broker');};
window.approveCounter=function(id){var bl=S.brokerLoads.filter(function(x){return x.id===id;})[0];if(bl&&bl.counter){bl.rate=bl.counter;bl.counterApproved=true;}var cl=S.carrierLoads.filter(function(x){return x.id===id;})[0];if(cl&&cl.counter){cl.rate=cl.counter;cl.counterApproved=true;}render();toast('✓ Counter approved — new rate set');};

/* ===== FINANCE / TRIP SETTLEMENT LEDGER ===== */
function ensureLedger(l){if(!l.earned)l.earned=[['Linehaul',l.rate]];if(!l.spent)l.spent=[['Dispatch fee (10%)',Math.round(l.rate*0.10)],['Fuel (est.)',Math.round((l.miles||0)*0.55)]];}
function ledgerNet(l){ensureLedger(l);var e=l.earned.reduce(function(a,x){return a+Number(x[1]||0);},0);var s=l.spent.reduce(function(a,x){return a+Number(x[1]||0);},0);return {e:e,s:s,net:e-s};}
function refreshNet(l){var n=ledgerNet(l);var nv=document.getElementById('net-val');if(nv){nv.innerHTML=(n.net>=0?'+':'')+money(n.net)+' <span style="font-size:.8rem;font-weight:700;color:var(--muted)">NET</span>';nv.style.webkitTextFillColor=n.net<0?'var(--bad)':'';}var te=document.getElementById('tot-e');if(te)te.textContent=money(n.e);var ts=document.getElementById('tot-s');if(ts)ts.textContent=money(n.s);}
function carrierFinance(){
  var booked=S.carrierLoads.filter(function(l){return l.cstatus==='accepted';});
  var tot={e:0,s:0,net:0};booked.forEach(function(l){var n=ledgerNet(l);tot.e+=n.e;tot.s+=n.s;tot.net+=n.net;});
  var list=booked.length?booked.map(function(l){var n=ledgerNet(l);return '<div class="qcard" onclick="openSettle(\''+l.id+'\')"><div class="av">🧾</div><div class="info"><b>'+esc(l.origin)+' → '+esc(l.dest)+'</b><div class="meta">'+esc(l.broker)+' · earned '+money(n.e)+' · spent '+money(n.s)+(l.emergency?' · 🚨 emergency':'')+'</div></div><span class="pill '+(n.net>=0?'ok':'bad')+'" style="font-family:var(--mono)">'+(n.net>=0?'+':'')+money(n.net)+'</span></div>';}).join(''):'<div class="card"><div class="empty">🧾 No trips to settle yet.<br><span style="font-size:.85rem">Accept a load — it appears here with a live settlement ledger.</span></div></div>';
  stage.className='stage fade';
  stage.innerHTML=carrierSubnav()+'<h1 class="h1">Finance — Trip Settlements</h1><p class="sub">Every booked load with its own live ledger. Add what you earned and spent — NET updates instantly and syncs with My Loads.</p>'
    +'<div class="big" style="margin:14px 0"><div class="m"><b>'+money(tot.e)+'</b><span>TOTAL EARNED</span></div><div class="m"><b>'+money(tot.s)+'</b><span>TOTAL SPENT</span></div><div class="m"><b style="'+(tot.net<0?'-webkit-text-fill-color:var(--bad)':'')+'">'+money(tot.net)+'</b><span>NET PROFIT</span></div><div class="m"><b>'+booked.length+'</b><span>TRIPS</span></div></div><div>'+list+'</div>';
}

function brokerLoads(nav){
  var loads=S.brokerLoads;
  var steps=['pending','forwarded','accepted','in_transit','delivered'];var lbl={pending:'With dispatch',forwarded:'Sent to carrier',accepted:'Carrier accepted',in_transit:'In transit',delivered:'Delivered',declined:'Declined'};
  var list=loads.length?loads.map(function(l){
    var si=steps.indexOf(l.status);var dec=l.status==='declined';
    var track=steps.map(function(st,k){var done=si>=k&&!dec;return '<div style="flex:1;text-align:center"><div style="height:6px;border-radius:99px;background:'+(done?'var(--grad)':'rgba(255,255,255,.1)')+'"></div><div style="font-size:.6rem;margin-top:4px;color:'+(done?'var(--acc)':'var(--faint)')+';font-weight:700">'+lbl[st].split(' ')[0]+'</div></div>';}).join('<div style="width:6px"></div>');
    var badge=dec?'<span class="pill bad">Declined</span>':'<span class="pill '+(l.status==='delivered'?'ok':l.status==='accepted'||l.status==='in_transit'?'info':'warn')+'">'+lbl[l.status]+'</span>';
    var em=l.emergency?'<div class="banner bad" style="margin:10px 0 0;padding:12px 14px"><div class="em">🚨</div><div><b style="color:var(--bad)">EMERGENCY — '+esc(l.emergency.cat)+'</b><div style="color:var(--ink2);font-size:.82rem">'+esc(l.emergency.reason)+' · reported '+esc(l.emergency.at)+'</div>'+(l.emergency.reschedule?'<div style="margin-top:8px;display:flex;gap:8px;align-items:center;flex-wrap:wrap"><span class="pill warn">Reschedule to '+esc(l.emergency.reschedule)+'</span>'+(l.emergency.approved?'<span class="pill ok">✓ Approved</span>':'<button class="btn sm green" onclick="event.stopPropagation();approveResched(\''+l.id+'\')">Approve reschedule</button>')+'</div>':'')+'</div></div>':'';
    var co=(l.counter&&!l.counterApproved)?'<div class="banner" style="margin:10px 0 0;padding:12px 14px;background:rgba(251,191,36,.1)"><div class="em">↩</div><div><b>Carrier counter: '+money(l.counter)+'</b><div style="color:var(--muted);font-size:.82rem">Was '+money(l.rate)+'. </div></div><button class="btn sm green" onclick="event.stopPropagation();approveCounter(\''+l.id+'\')">Approve</button></div>':'';
    return '<div class="lcard"><div class="lhead"><div><div class="lane">'+esc(l.origin)+' <span style="color:var(--acc)">→</span> '+esc(l.dest)+'</div><div class="meta">'+esc(l.carrierName)+' · '+esc(l.equip)+' · '+esc(l.weight)+' lbs</div></div><div style="text-align:right"><div class="rate">'+money(l.rate)+'</div>'+badge+'</div></div><div style="display:flex;align-items:flex-start;margin-top:14px">'+track+'</div>'+co+em+'</div>';
  }).join(''):'<div class="card"><div class="empty">📭 You haven\'t posted any loads yet.<br><span style="font-size:.85rem">Open a verified carrier and post a load — track it here through dispatch → carrier → delivery.</span></div></div>';
  stage.innerHTML=nav+'<h1 class="h1">My Posted Loads</h1><p class="sub">Track every load you posted — through LoadBoot dispatch, to carrier acceptance, transit and delivery. Emergencies from carriers surface here instantly.</p><div style="margin-top:14px">'+list+'</div>';
}
window.openBroker=function(id){S.brokerOpen=id;S.ptab=0;render();};
window.changeBrokerTab=function(i){S.ptab=i;brokerProfile();};
function brokerProfile(){
  var s=S.posts.filter(function(x){return x.id===S.brokerOpen;})[0];if(!s){S.brokerOpen=null;return renderBroker();}var D=s.fmcsa,c=D.c;
  stage.innerHTML='<button class="btn ghost" onclick="S.brokerOpen=null;render()">← All carriers</button><div class="card" style="margin-top:14px"><div style="display:flex;gap:14px;align-items:center;flex-wrap:wrap"><div class="av" style="width:56px;height:56px;border-radius:15px;background:var(--gradd);color:#fff;display:grid;place-items:center;font-weight:900;font-size:1.2rem">'+initials(s.name)+'</div><div><h1 class="h1" style="margin:0">'+esc(s.name)+' <span class="verified">✔ VERIFIED</span></h1><p class="sub">DOT '+esc(s.dot)+(s.mc?' · MC '+esc(s.mc):'')+' · '+esc(s.city)+'</p></div></div>'+(s.bio?'<p style="margin:12px 0 0;color:var(--ink2)">'+esc(s.bio)+'</p>':'')
    +'<div class="banner" style="margin-top:14px;background:rgba(59,157,255,.08)"><div class="em">💬</div><div><b>All contact goes through LoadBoot dispatch</b><div style="color:var(--muted);font-size:.85rem">You never get the carrier\'s direct line — LoadBoot coordinates every load so nothing routes around us. Reach dispatch by phone, email or <b>live chat</b>. The Carrier Packet (authority, COI, W-9, agreement) is in the button below.</div></div></div>'
    +'<div class="big"><div class="m"><b>'+j(c.power_units)+'</b><span>TRUCKS</span></div><div class="m"><b>'+j(c.total_drivers)+'</b><span>DRIVERS</span></div><div class="m"><b>'+s.drvRate.toFixed(1)+'%</b><span>DRIVER OOS</span></div><div class="m"><b>'+s.crash+'</b><span>CRASHES 24mo</span></div></div>'
    +'<div class="sec-h">Equipment</div><div class="chips">'+(s.equip.length?s.equip.map(function(e){return '<span class="chip">'+esc(e)+'</span>';}).join(''):'<span class="chip">General Freight</span>')+'</div>'
    +'<div class="sec-h">Lanes</div><div class="chips">'+(s.lanes&&s.lanes.length?s.lanes.map(function(e){return '<span class="chip">'+esc(e)+'</span>';}).join(''):'<span class="chip">OTR / 48 States</span>')+'</div>'
    +'<div class="sec-h">Compliance <span class="verified">✔ on file</span></div><div class="chips"><span class="chip ok">✔ COI</span><span class="chip ok">✔ W-9</span><span class="chip ok">✔ Signed Agreement</span><span class="chip ok">✔ FMCSA Authority</span></div>'
    +'<div class="sec-h">🗂️ Full FMCSA profile</div>'+profileTabs(D,S.ptab,'changeBrokerTab',true)
    +'<div style="margin-top:20px;display:flex;gap:10px;flex-wrap:wrap"><button class="btn" onclick="openLoadComposer(\''+s.id+'\')">📦 Post Your Load to This Carrier</button><button class="btn ghost" onclick="showPacket(\''+s.id+'\')">📄 View Carrier Packet (PDF)</button></div></div>';
}
window.showPacket=function(id){var s=S.posts.filter(function(x){return x.id===id;})[0];if(!s)return;var c=s.fmcsa.c;
  showModal('<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><h3 style="margin:0">📄 Carrier Packet</h3><span class="pill info">via LoadBoot dispatch</span></div>'
    +'<div class="packet"><h4>'+esc(s.name)+'</h4><div style="color:#7089ab;font-size:.8rem;margin-bottom:10px">DOT '+esc(s.dot)+(s.mc?' · MC '+esc(s.mc):'')+' — Verified by LoadBoot</div>'
    +'<div style="background:#e9f2ff;border:1px solid #cfe1fb;border-radius:10px;padding:12px;margin-bottom:10px"><div style="font-weight:800;color:#123a6b;margin-bottom:6px">📞 All coordination routes through LoadBoot Dispatch</div><div class="prow"><span class="k">Dispatch Line</span><span>'+LB.phone+'</span></div><div class="prow"><span class="k">Dispatch Email</span><span>'+LB.email+'</span></div><div class="prow" style="border:0"><span class="k">Live Chat</span><span>In-app · 24/7</span></div></div>'
    +'<div style="font-weight:800;color:#123a6b;margin:6px 0">Enclosed documents</div><div class="prow"><span class="k">✔ Operating Authority (MC)</span><span>PDF</span></div><div class="prow"><span class="k">✔ Certificate of Insurance</span><span>PDF</span></div><div class="prow"><span class="k">✔ W-9 Tax Form</span><span>PDF</span></div><div class="prow"><span class="k">✔ Signed Carrier/Dispatch Agreement</span><span>PDF</span></div></div>'
    +'<div class="banner" style="margin-top:12px;background:rgba(59,157,255,.08)"><div class="em">🔒</div><div><b>Carrier stays protected</b><div style="color:var(--muted);font-size:.85rem">The carrier\'s own phone & email are never shared. LoadBoot dispatch is your single point of contact — by phone, email or live chat.</div></div></div>'
    +'<div class="wnav" style="border:0"><button class="btn ghost" onclick="closeModal()">Close</button><button class="btn" onclick="closeModal();openLiveChat()">💬 Live chat with dispatch</button></div>');
};
window.openLiveChat=function(){showModal('<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><h3 style="margin:0">💬 LoadBoot Dispatch</h3><span class="pill ok">🟢 Online</span></div>'
  +'<div style="background:var(--panel);border:1px solid var(--bd);border-radius:14px;padding:14px;min-height:120px"><div style="background:rgba(59,157,255,.14);border-radius:12px 12px 12px 4px;padding:10px 12px;max-width:82%;font-size:.9rem">Hi 👋 You are chatting with LoadBoot dispatch. Share the lane, rate & pickup and we will coordinate with the carrier for you.</div></div>'
  +'<div style="display:flex;gap:8px;margin-top:12px"><input class="inp" id="lc-msg" placeholder="Type a message…" style="flex:1"><button class="btn" onclick="toast(\'Message sent to dispatch ✓\');closeModal()">Send</button></div>');};
window.openLoadComposer=function(carrierId){
  var s=S.posts.filter(function(x){return x.id===carrierId;})[0];if(!s)return;
  S.loadDraft={carrierId:carrierId,carrierName:s.name,accessorials:(s.accessorials||ACCESSORIALS).map(function(a){return a.slice();}),policies:POLICIES.slice(),reqPolicy:POLICIES.map(function(){return true;})};
  var acc=S.loadDraft.accessorials.map(function(a,i){return '<div class="acc"><div class="an">'+esc(a[0])+'</div><div class="au">'+esc(a[1])+'</div><input class="mono" inputmode="numeric" value="'+esc(a[2])+'" oninput="S.loadDraft.accessorials['+i+'][2]=this.value"></div>';}).join('');
  var pol=S.loadDraft.policies.map(function(p,i){return '<div class="policy on" id="rp'+i+'" onclick="toggleReqPolicy('+i+')"><div class="cb">✓</div><div class="pt">'+esc(p)+'</div></div>';}).join('');
  showModal('<h3 style="margin:0 0 4px">📦 Post load to '+esc(s.name)+'</h3><p class="sub" style="margin-bottom:14px">Define the load, accessorial rates & the policies the carrier must agree to. Routes through LoadBoot dispatch (CC) to the carrier.</p><div class="grid2"><div class="field"><label>Origin</label><input class="inp" id="ld-o" placeholder="Dallas, TX"></div><div class="field"><label>Destination</label><input class="inp" id="ld-d" placeholder="Atlanta, GA"></div></div><div class="grid3"><div class="field"><label>Equipment</label><select class="inp" id="ld-eq">'+(s.equip.length?s.equip:EQUIP).map(function(e){return '<option>'+e+'</option>';}).join('')+'</select></div><div class="field"><label>Weight (lbs)</label><input class="inp mono" id="ld-w" inputmode="numeric" placeholder="44000"></div><div class="field"><label>Miles</label><input class="inp mono" id="ld-mi" inputmode="numeric" placeholder="780"></div></div><div class="grid2"><div class="field"><label>Commodity</label><input class="inp" id="ld-c" placeholder="Palletized beverages"></div><div class="field"><label>Line-haul Rate ($)</label><input class="inp mono" id="ld-r" inputmode="numeric" placeholder="2450"></div></div><div class="grid2"><div class="field"><label>Pickup</label><input class="inp" id="ld-pu" placeholder="Tue 8:00 AM"></div><div class="field"><label>Delivery</label><input class="inp" id="ld-de" placeholder="Wed 3:00 PM"></div></div><div class="field"><label>Special Instructions</label><textarea class="inp" id="ld-n" placeholder="e.g. Lumper at delivery, appointment required."></textarea></div><div class="sec-h">💵 Accessorial rates you offer</div><div class="box">'+acc+'</div><div class="sec-h">📋 Policies the carrier must agree to <span class="verified">tap to toggle</span></div>'+pol+'<div class="wnav"><button class="btn ghost" onclick="closeModal()">Cancel</button><button class="btn" onclick="submitLoad()">Post Load →</button></div>');
};
window.toggleReqPolicy=function(i){S.loadDraft.reqPolicy[i]=!S.loadDraft.reqPolicy[i];var el=document.getElementById('rp'+i);if(el){el.classList.toggle('on',S.loadDraft.reqPolicy[i]);el.querySelector('.cb').textContent=S.loadDraft.reqPolicy[i]?'✓':'';}};
window.submitLoad=function(){
  var g=function(id){return (document.getElementById(id)||{}).value||'';};var o=g('ld-o'),dd=g('ld-d'),r=g('ld-r');if(!o||!dd||!r){toast('Fill origin, destination & rate');return;}var ld=S.loadDraft;
  var load={id:'load_'+Date.now(),carrierId:ld.carrierId,carrierName:ld.carrierName,broker:'Ryder Logistics (You)',origin:o,dest:dd,equip:g('ld-eq'),weight:g('ld-w')||'0',miles:Number(g('ld-mi')||0),commodity:g('ld-c')||'General freight',rate:Number(String(r).replace(/[^0-9.]/g,''))||0,pickup:g('ld-pu')||'TBD',delivery:g('ld-de')||'TBD',notes:g('ld-n'),accessorials:ld.accessorials.slice(),policies:ld.policies.filter(function(p,i){return ld.reqPolicy[i];}),status:'pending',posted:new Date().toLocaleString()};
  S.brokerLoads.unshift(load);closeModal();toast('Load posted — routed to LoadBoot dispatch 📦');S.ccTab='loads';
};
function showModal(html){var m=document.createElement('div');m.className='modal';m.id='modal';m.innerHTML='<div class="box">'+html+'</div>';m.onclick=function(e){if(e.target===m)closeModal();};document.body.appendChild(m);}
window.closeModal=function(){var m=document.getElementById('modal');if(m)m.remove();};
seedMarket();render();
</script>
