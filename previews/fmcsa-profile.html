<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>FMCSA Carrier Profile — LoadBoot</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;font-family:Inter,system-ui,Arial,sans-serif}
body{margin:0;background:#eef2f7;color:#0f1e36}
.top{max-width:1120px;margin:0 auto;padding:16px}
.search{display:flex;gap:8px;margin-bottom:12px}
.search input{flex:1;border:1px solid #d5deea;border-radius:12px;padding:12px 14px;font-size:1rem}
.search button{background:linear-gradient(135deg,#0e7490,#0883F7);color:#fff;border:0;border-radius:12px;padding:0 24px;font-weight:800;cursor:pointer}
.note{background:#0b1b33;color:#dce3f2;border-radius:12px;padding:11px 16px;font-size:.82rem;margin-bottom:12px;line-height:1.5}
.hero{background:linear-gradient(120deg,#0a1a33,#123a6b 55%,#1667c9);border-radius:16px 16px 0 0;padding:26px 28px;color:#fff;position:relative;overflow:hidden}
.hero h1{font-size:1.9rem;font-weight:900;margin:0 0 8px;letter-spacing:-.5px}
.hmeta{display:flex;gap:18px;align-items:center;color:#c7dbf5;font-size:.9rem;margin-bottom:14px;flex-wrap:wrap}
.badges{display:flex;gap:10px;flex-wrap:wrap}
.badge{display:inline-flex;align-items:center;gap:7px;border-radius:10px;padding:9px 15px;font-weight:800;font-size:.88rem;background:rgba(255,255,255,.12)}
.badge.g{background:#16a34a}.badge.gray{background:rgba(255,255,255,.14)}
.stats{position:absolute;top:24px;right:28px;display:flex;gap:12px}
.stat{background:#fff;color:#0f1e36;border-radius:14px;padding:14px 20px;text-align:center;min-width:110px;box-shadow:0 10px 30px -12px rgba(0,0,0,.4)}
.stat b{display:block;font-size:1.9rem;font-weight:900;color:#123a6b;line-height:1}
.stat span{font-size:.68rem;font-weight:800;letter-spacing:.07em;color:#7089ab}
.tabs{background:#fff;display:flex;gap:2px;padding:0 12px;border-bottom:1px solid #e6edf5;overflow:auto}
.tab{padding:15px 16px;font-weight:700;font-size:.9rem;color:#5b7a9c;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap}
.tab.on{color:#0883F7;border-bottom-color:#0883F7}
.wrap{max-width:1120px;margin:0 auto;padding:0 16px 40px}
.panel{background:#fff;border-radius:0 0 16px 16px;padding:22px 26px;min-height:200px}
.cols{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.box{border:1px solid #e6edf5;border-radius:14px;padding:18px}
.box h3{margin:0 0 12px;font-size:1rem;color:#123a6b;display:flex;align-items:center;gap:8px}
.f{padding:8px 0;border-bottom:1px solid #f1f5fa}
.f:last-child{border-bottom:0}
.f .k{font-size:.7rem;text-transform:uppercase;letter-spacing:.04em;color:#8aa0bd;font-weight:800;margin-bottom:2px}
.f .v{font-size:.98rem;font-weight:600}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
.chip{background:#eef5ff;color:#1667c9;border:1px solid #d3e4fb;border-radius:99px;padding:6px 13px;font-size:.82rem;font-weight:700}
.chip.warn{background:#fff4e6;color:#b45309;border-color:#f5d9a8}
.chip.bad{background:#fdecec;color:#c62828;border-color:#f5c2c2}
.chip.ok{background:#e7f9ee;color:#12a150;border-color:#bce8cd}
.big{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.m{background:#f7fafd;border:1px solid #e6edf5;border-radius:14px;padding:15px;text-align:center}
.m b{display:block;font-size:1.7rem;font-weight:900;color:#123a6b}.m span{font-size:.68rem;color:#7089ab;font-weight:700;letter-spacing:.04em}
.sec-h{font-size:1.1rem;font-weight:800;margin:4px 0 14px;color:#123a6b}
table{width:100%;border-collapse:collapse;font-size:.86rem}
th{text-align:left;color:#8aa0bd;font-size:.7rem;text-transform:uppercase;letter-spacing:.04em;padding:8px 10px;border-bottom:2px solid #eef2f7}
td{padding:9px 10px;border-bottom:1px solid #f1f5fa}
.pill{display:inline-block;padding:3px 9px;border-radius:99px;font-size:.72rem;font-weight:800}
.pill.ok{background:#e7f9ee;color:#12a150}.pill.bad{background:#fdecec;color:#c62828}.pill.warn{background:#fff4e6;color:#b45309}
.card{border:1px solid #e6edf5;border-radius:14px;padding:16px;margin-bottom:12px}
.card .bar{height:5px;background:linear-gradient(90deg,#0883F7,#0e7490);border-radius:14px 14px 0 0;margin:-16px -16px 14px}
.row{display:flex;justify-content:space-between;gap:12px;padding:7px 0;border-bottom:1px solid #f4f7fb;font-size:.9rem}
.insp{display:flex;justify-content:space-between;align-items:center;border:1px solid #e6edf5;border-radius:12px;padding:12px 14px;margin-bottom:10px;gap:12px;flex-wrap:wrap}
.insp .l{font-weight:800;color:#123a6b}
.cmp{display:flex;gap:12px;flex-wrap:wrap}
.cmp .c{flex:1;min-width:150px;border:1px solid #e6edf5;border-radius:12px;padding:14px;text-align:center}
.cmp .c b{font-size:1.6rem;font-weight:900;display:block}
.empty{text-align:center;color:#8aa0bd;padding:44px;font-size:.95rem}
.load{text-align:center;padding:55px;color:#5b7a9c}
.above{color:#c62828;font-weight:700;font-size:.78rem}.below{color:#12a150;font-weight:700;font-size:.78rem}
@media(max-width:820px){.stats{position:static;margin-top:14px}.cols{grid-template-columns:1fr}.big{grid-template-columns:1fr 1fr}.hero h1{font-size:1.4rem}}
</style></head><body>
<div class="top">
  <div class="note"><b>LoadBoot — full FMCSA carrier profile (preview).</b> Every tab powered by free public FMCSA / US-DOT open data. Our own design & code — no third-party site copied. Enter any USDOT and Search.</div>
  <div class="search"><input id="dot" placeholder="Enter USDOT (e.g. 3761697)" value="3761697"><button id="go">Search</button></div>
</div>
<div id="app"></div>
<script>
var BASE="https://data.transportation.gov/resource";
var app=document.getElementById('app');
function j(v){var n=Number(v);return (v!=null&&v!==''&&isFinite(n))?n:0;}
function d(v){var s=String(v||'').trim();if(s.length<8)return null;return s.slice(4,6)+'/'+s.slice(6,8)+'/'+s.slice(0,4);}
function esc(s){return String(s==null?'':s).replace(/[&<>]/g,function(m){return{'&':'&amp;','<':'&lt;','>':'&gt;'}[m];});}
function ph(v){var s=String(v||'').replace(/\D/g,'');return s.length===10?('('+s.slice(0,3)+') '+s.slice(3,6)+'-'+s.slice(6)):(v||'—');}
async function get(path){try{var r=await fetch(BASE+'/'+path,{headers:{'Accept':'application/json'}});if(!r.ok)return null;return await r.json();}catch(e){return null;}}
function vinYear(vin){if(!vin||vin.length<10)return '';var c=vin.charAt(9).toUpperCase();var map={A:2010,B:2011,C:2012,D:2013,E:2014,F:2015,G:2016,H:2017,J:2018,K:2019,L:2020,M:2021,N:2022,P:2023,R:2024,S:2025,T:2026,V:2027,W:2028,X:2029,Y:2030};if(map[c])return map[c];if(/[1-9]/.test(c))return 2000+parseInt(c);return '';}
var CARGO={crgo_genfreight:"General Freight",crgo_household:"Household Goods",crgo_metalsheet:"Metal: Sheets, Coils, Rolls",crgo_motorveh:"Motor Vehicles",crgo_drivetow:"Drive/Tow Away",crgo_logpole:"Logs, Poles, Lumber",crgo_bldgmat:"Building Materials",crgo_mobilehome:"Mobile Homes",crgo_machlrg:"Machinery, Large Objects",crgo_produce:"Produce",crgo_liqgas:"Liquids/Gases",crgo_intermodal:"Intermodal Containers",crgo_passengers:"Passengers",crgo_oilfield:"Oilfield Equipment",crgo_livestock:"Livestock",crgo_grainfeed:"Grain, Feed, Hay",crgo_coalcoke:"Coal/Coke",crgo_meat:"Meat",crgo_garbage:"Garbage/Refuse",crgo_usmail:"US Mail",crgo_chem:"Chemicals",crgo_drybulk:"Dry Bulk",crgo_coldfood:"Refrigerated Food",crgo_beverages:"Beverages",crgo_paperprod:"Paper Products",crgo_utility:"Utility",crgo_farmsupp:"Farm Supplies",crgo_construct:"Construction Materials",crgo_waterwell:"Water Well"};
function basicOf(part){var p=String(part||'').slice(0,3);if(p==='392'||p==='397')return "Unsafe Driving";if(p==='395'||p==='398')return "Hours of Service";if(p==='391'||p==='383')return "Driver Fitness";if(p==='382')return "Controlled Substances";if(p==='393'||p==='396')return "Vehicle Maintenance";return "Vehicle Maintenance";}
function vType(part){var p=String(part||'').slice(0,3);if(p==='393'||p==='396')return 'Vehicle';if(p==='397'||p==='171'||p==='172'||p==='173'||p==='177'||p==='178'||p==='180')return 'Hazmat';return 'Driver';}
var BCATS=["Unsafe Driving","Hours of Service","Vehicle Maintenance","Controlled Substances","Driver Fitness"];
var lvl={"1":"Level I - Full","2":"Level II - Walk-Around","3":"Level III - Driver Only","4":"Level IV - Special","5":"Level V - Vehicle Only","6":"Level VI - Radioactive"};
var TABS=["General Information","Fleet","Insurance","Safety","Inspections","Violations","Crashes"];
var DATA={},cur=0;

async function load(dot){
  dot=String(dot).replace(/\D/g,'');if(!dot)return;
  var pad=dot.padStart(8,'0');
  app.innerHTML='<div class="load">Loading live FMCSA data for DOT '+esc(dot)+' — census, authority, insurance, inspections, violations, crashes, vehicles…</div>';
  var census=await get('az4n-8mr2.json?dot_number='+dot+'&$limit=1');
  var c=(census&&census[0])||null;
  if(!c){app.innerHTML='<div class="wrap"><div class="panel"><div class="empty">No carrier found at FMCSA for DOT '+esc(dot)+'.</div></div></div>';return;}
  var mcNum=c.docket1?String(c.docket1):'';
  var R=await Promise.all([
    get('6eyk-hxee.json?dot_number='+pad+'&$limit=1'),
    get('qh9u-swkp.json?dot_number='+pad+'&$order=effective_date DESC&$limit=10'),
    get('fx4q-ay7w.json?dot_number='+dot+'&$order=insp_date DESC&$limit=250'),
    get('aayw-vxb3.json?dot_number='+dot+'&$order=report_date DESC&$limit=100'),
    get('rbkj-cgst.json?dot_number='+dot+'&$limit=250'),
    mcNum?get('6sqe-dvqs.json?docket_number=MC'+mcNum+'&$order=effective_date DESC&$limit=30'):Promise.resolve([])
  ]);
  var auth=(R[0]&&R[0][0])||null, ins=R[1]||[], insp=R[2]||[], crash=R[3]||[], units=R[4]||[], inshist=R[5]||[];
  var viol=[];
  if(insp.length){
    var ids=insp.map(function(x){return "'"+x.inspection_id+"'";}).filter(Boolean).join(',');
    var vr=await get("876r-jsdb.json?$where=inspection_id in ("+ids+")&$limit=500");
    viol=vr||[];
  }
  DATA={c:c,auth:auth,ins:ins,insp:insp,crash:crash,units:units,inshist:inshist,viol:viol,dot:dot,open:{}};
  render();
}

function render(){
  var c=DATA.c;
  var mc=c.docket1?((c.docket1prefix||'MC')+' '+c.docket1):'—';
  var html='<div class="wrap"><div class="hero"><h1>'+esc(c.legal_name||'—')+'</h1>'
   +'<div class="hmeta"><span>📍 '+esc((c.phy_city||'')+', '+(c.phy_state||''))+'</span><span>📅 '+esc(d(c.add_date)||'—')+'</span></div>'
   +'<div class="badges"><span class="badge g">✔ DOT '+esc(c.dot_number)+'</span>'
   +(c.docket1?'<span class="badge g">✔ '+esc(mc)+'</span>':'')
   +'<span class="badge gray">🚚 Carrier</span>'
   +'<span class="badge gray">'+(String(c.carrier_operation||'').toUpperCase()==='A'?'Interstate':'Intrastate')+'</span></div>'
   +'<div class="stats"><div class="stat"><b>'+esc(c.power_units||'0')+'</b><span>POWER UNITS</span></div><div class="stat"><b>'+esc(c.total_drivers||'0')+'</b><span>DRIVERS</span></div></div></div>';
  html+='<div class="tabs">'+TABS.map(function(t,i){return '<div class="tab'+(i===cur?' on':'')+'" onclick="sel('+i+')">'+t+'</div>';}).join('')+'</div>';
  html+='<div class="panel">'+panel()+'</div></div>';
  app.innerHTML=html;
}
window.sel=function(i){cur=i;render();};
window.toggleInsp=function(id){DATA.open[id]=!DATA.open[id];render();};
function F(k,v){return '<div class="f"><div class="k">'+k+'</div><div class="v">'+esc(v==null||v===''?'—':v)+'</div></div>';}

// compute safety/violation aggregates
function agg(){
  var insp=DATA.insp,viol=DATA.viol;
  var vehInsp=0,drvInsp=0,vehOOS=0,drvOOS=0,states={};
  insp.forEach(function(x){
    var L=String(x.insp_level_id);
    if(L==='1'||L==='2'||L==='5')vehInsp++;
    if(L==='1'||L==='2'||L==='3')drvInsp++;
    if(j(x.vehicle_oos_total)>0)vehOOS++;
    if(j(x.driver_oos_total)>0)drvOOS++;
    if(x.report_state)states[x.report_state]=1;
  });
  var byCat={};BCATS.forEach(function(b){byCat[b]={total:0,oos:0};});
  var inspHasCat={};
  viol.forEach(function(v){
    var b=basicOf(v.part_no);if(!byCat[b])byCat[b]={total:0,oos:0};
    byCat[b].total++; if(String(v.out_of_service_indicator||'').toUpperCase()==='Y')byCat[b].oos++;
    var id=v.inspection_id;inspHasCat[id]=inspHasCat[id]||{};inspHasCat[id][b]=1;
  });
  var inspCat={};BCATS.forEach(function(b){inspCat[b]=0;});var clean=0;
  insp.forEach(function(x){var h=inspHasCat[x.inspection_id];if(!h||!Object.keys(h).length){clean++;return;}BCATS.forEach(function(b){if(h[b])inspCat[b]++;});});
  return {vehInsp:vehInsp,drvInsp:drvInsp,vehOOS:vehOOS,drvOOS:drvOOS,states:Object.keys(states).length,byCat:byCat,inspCat:inspCat,clean:clean,
    vehRate:vehInsp?(100*vehOOS/vehInsp):0,drvRate:drvInsp?(100*drvOOS/drvInsp):0,totalViol:viol.length,
    oosViol:viol.filter(function(v){return String(v.out_of_service_indicator||'').toUpperCase()==='Y';}).length};
}

function panel(){
  var c=DATA.c,auth=DATA.auth,ins=DATA.ins,insp=DATA.insp,crash=DATA.crash,units=DATA.units,inshist=DATA.inshist;
  var A=agg();
  if(cur===0){
    var cargo=[];for(var k in CARGO){if(String(c[k]||'').toUpperCase()==='X')cargo.push(CARGO[k]);}
    return '<div class="cols"><div class="box"><h3>📍 Address</h3>'
      +F('Physical Address',(c.phy_street||'')+', '+(c.phy_city||'')+', '+(c.phy_state||'')+' '+(c.phy_zip||''))
      +F('Mailing Address',(c.carrier_mailing_street||'')+', '+(c.carrier_mailing_city||'')+', '+(c.carrier_mailing_state||'')+' '+(c.carrier_mailing_zip||''))+'</div>'
      +'<div class="box"><h3>🗺️ Service Map</h3>'+F('Inspections recorded in',A.states+' states')
      +F('Operating status',String(c.status_code).toUpperCase()==='A'?'ACTIVE':'INACTIVE')+F('Entity',c.classdef)+'</div></div>'
      +'<div class="cols" style="margin-top:16px"><div class="box"><h3>📞 Contact Information</h3>'+F('Phone',ph(c.phone))+F('Email',c.email_address)+'</div>'
      +'<div class="box"><h3>🛣️ Mileage Info</h3>'+F('Annual Mileage',(c.mcs150_mileage?Number(c.mcs150_mileage).toLocaleString():'—')+' miles (MCS-150)')+F('Reported Year',c.mcs150_mileage_year)+F('MCS-150 Update',d(c.mcs150_date))+'</div></div>'
      +'<div class="box" style="margin-top:16px"><h3>📦 Operation Information</h3><div class="f"><div class="k">Cargo Carried</div><div class="chips">'
      +(cargo.length?cargo.map(function(x){return '<span class="chip">'+x+'</span>';}).join(''):'—')+'</div></div>'
      +F('HazMat Status',String(c.hm_ind).toUpperCase()==='Y'?'Authorized':'Not Authorized')+'</div>';
  }
  if(cur===1){
    var trucks=j(c.owntract)+j(c.trmtruck)+j(c.trptruck), trucksL=j(c.trmtruck)+j(c.trptruck);
    var trailers=j(c.owntrail)+j(c.trmtrail)+j(c.trptrail), trailersL=j(c.trmtrail)+j(c.trptrail);
    var seen={},rows=[];
    units.forEach(function(u){
      [['vin','unit_make','unit_license','unit_license_state','unit_type_desc'],['vin2','unit_make2','unit_license2','unit_license_state2','unit_type_desc2']].forEach(function(f){
        var vin=u[f[0]];if(vin&&!seen[vin]){seen[vin]=1;rows.push({type:u[f[4]]||'',year:vinYear(vin),make:u[f[1]]||'',vin:vin,plate:(u[f[3]]||'')+' '+(u[f[2]]||'')});}
      });
    });
    return '<div class="sec-h">Equipment Summary</div><div class="big">'
      +'<div class="m"><b>'+j(c.owntract)+'</b><span>TRUCKS (OWNED)</span></div><div class="m"><b>'+trucksL+'</b><span>TRUCKS (LEASED)</span></div>'
      +'<div class="m"><b>'+j(c.owntrail)+'</b><span>TRAILERS (OWNED)</span></div><div class="m"><b>'+trailersL+'</b><span>TRAILERS (LEASED)</span></div></div>'
      +'<div class="sec-h">Driver Summary</div><div class="big">'
      +'<div class="m"><b>'+j(c.total_cdl)+'</b><span>CDL DRIVERS</span></div><div class="m"><b>'+(j(c.total_drivers)-j(c.total_cdl))+'</b><span>NON-CDL</span></div>'
      +'<div class="m"><b>'+j(c.driver_inter_total)+'</b><span>INTERSTATE</span></div><div class="m"><b>'+j(c.total_intrastate_drivers)+'</b><span>INTRASTATE</span></div></div>'
      +'<div class="sec-h">Equipment Details ('+rows.length+' seen in inspections)</div>'
      +(rows.length?'<table><thead><tr><th>Type</th><th>Year</th><th>Make</th><th>VIN</th><th>License</th></tr></thead><tbody>'
        +rows.map(function(r){return '<tr><td>'+esc(r.type)+'</td><td>'+esc(r.year)+'</td><td>'+esc(r.make)+'</td><td>'+esc(r.vin)+'</td><td>'+esc(r.plate.trim())+'</td></tr>';}).join('')+'</tbody></table>'
        :'<div class="empty">No inspected vehicles on record.</div>');
  }
  if(cur===2){
    var cur_h='<div class="sec-h">Current Insurance Policies ('+ins.length+')</div>';
    if(!ins.length)cur_h+='<div class="empty">No active insurance on file.</div>';
    else cur_h+=ins.map(function(p,i){return '<div class="card"><div class="bar"></div>'
      +'<div class="row"><span><b>Policy '+(i+1)+'</b></span><span>Effective: '+esc(d(p.effective_date)||'—')+'</span></div>'
      +'<div class="cols" style="margin-top:8px">'+F('Insurance carrier',p.name_company)+F('Policy number',p.policy_no)
      +F('Coverage amount',p.max_cov_amount?('$'+Number(p.max_cov_amount).toLocaleString()):'—')+F('Insurance type',p.mod_col_1)
      +F('Insurance class',p.mod_col_3)+F('Form code',p.ins_form_code)+'</div></div>';}).join('');
    var hist_h='<div class="sec-h" style="margin-top:18px">Previous Insurance History ('+inshist.length+')</div>';
    if(!inshist.length)hist_h+='<div class="empty">No prior policies on record.</div>';
    else hist_h+=inshist.map(function(p){
        function pd(x){x=String(x||'').slice(0,8);if(x.length<8)return null;return new Date(+x.slice(0,4),+x.slice(4,6)-1,+x.slice(6,8));}
        var e=pd(p.effective_date),cl=pd(p.cancl_effective_date),dur='';
        if(e&&cl){var dd=Math.round((cl-e)/86400000);var yr=Math.floor(dd/365);dur=(yr>=1?(yr+' year'+(yr>1?'s':'')+' '):'')+'('+dd+' days total)';}
        var mc3=String(p.mod_col_3||''),parts=mc3.split('/'),typ=parts[0]||'',cls=parts[1]||'';
        var st=(p.mod_col_1||'').toUpperCase();
        return '<div style="border-left:4px solid '+(st.indexOf('CANCEL')>=0?'#c62828':'#0883F7')+';background:#f7fafd;border-radius:12px;padding:16px;margin-bottom:12px">'
          +'<div style="font-weight:800;color:#123a6b;letter-spacing:.02em">'+esc((mc3+' POLICY '+(st||'ON RECORD')).toUpperCase())+'</div>'
          +(dur?'<div style="background:#eef5ff;border-radius:8px;padding:8px 12px;margin:8px 0;font-size:.85rem;color:#3f5b7a">Policy was in effect '+dur+'</div>':'')
          +'<div class="cols" style="margin-top:6px">'+F('Policy Number',p.policy_no)+F('Coverage',p.min_cov_amount?('$'+(Number(p.min_cov_amount)*1000).toLocaleString()):'—')
          +F('Effective Date',d(p.effective_date))+F('Cancelation Date',d(p.cancl_effective_date))
          +F('Type',typ)+F('Class',cls)+F('Insurer',p.name_company)+F('Cancelation Method',p.cancl_method)+'</div></div>';
      }).join('');
    return cur_h+hist_h;
  }
  if(cur===3){
    return '<div class="cols"><div class="box"><h3>🛡️ Safety Information</h3>'+F('Safety Rating','Not Available')+F('Recordable Crash Rate',c.recordable_crash_rate||'0.000')+'</div>'
      +'<div class="box"><h3>🚦 Out of Service Rates</h3><div class="f"><div class="k">Based on % of inspections in the last 24 months</div></div>'
      +F('Driver OOS Rate',A.drvRate.toFixed(1)+'%')+F('Vehicle OOS Rate',A.vehRate.toFixed(1)+'%')+'</div></div>'
      +'<div class="sec-h" style="margin-top:18px">Violations by BASIC Category</div><div class="big">'
      +BCATS.map(function(b){var n=A.byCat[b].total;return '<div class="m"><b>'+n+'</b><span>'+b.toUpperCase()+'</span></div>';}).join('')+'</div>';
  }
  if(cur===4){
    var chips='<div class="chips" style="margin-bottom:16px">'+BCATS.map(function(b){var n=A.inspCat[b];return '<span class="chip'+(n>3?' bad':(n>0?' warn':''))+'">'+b+' · '+n+'</span>';}).join('')
      +'<span class="chip ok">Clean · '+A.clean+'</span></div>';
    if(!insp.length)return '<div class="sec-h">Inspections</div><div class="empty">No inspections on record.</div>';
    var uByI={};DATA.units.forEach(function(u){var id=u.unique_id||u.inspection_id;if(id)(uByI[id]=uByI[id]||[]).push(u);});
    var vByI={};DATA.viol.forEach(function(v){(vByI[v.inspection_id]=vByI[v.inspection_id]||[]).push(v);});
    return '<div class="sec-h">Filter by BASIC Category</div>'+chips+'<div class="sec-h">Recent Inspections ('+insp.length+')</div>'
      +insp.slice(0,25).map(function(x){var oos=j(x.oos_total)>0;var id=x.inspection_id;var op=DATA.open[id];
        var head='<div class="insp" style="'+(op?'border-radius:12px 12px 0 0;margin-bottom:0':'')+'"><div><div class="l">'+esc(d(x.insp_date))+'</div><div style="color:#5b7a9c;font-size:.82rem">'+esc(lvl[String(x.insp_level_id)]||('Level '+x.insp_level_id))+' · '+esc(x.report_state)+' — '+esc(x.location_desc||x.location||'')+'</div><div style="color:#8aa0bd;font-size:.76rem">Report #: '+esc(x.report_number)+'</div></div>'
          +'<div style="text-align:right"><span class="pill '+(j(x.viol_total)>0?'warn':'ok')+'">'+esc(x.viol_total||'0')+' Violations</span>'+(oos?' <span class="pill bad">OOS</span>':'')+'<div><button onclick="toggleInsp(\''+id+'\')" style="margin-top:8px;background:#eef3fb;border:1px solid #d3e0ef;color:#0883F7;border-radius:8px;padding:5px 12px;font-weight:700;cursor:pointer;font-size:.8rem">'+(op?'Hide Details ▴':'View Details ▾')+'</button></div></div></div>';
        if(!op)return head;
        var us=uByI[id]||[],eq='';
        us.forEach(function(u){[['vin','unit_make','unit_license','unit_license_state','unit_type_desc'],['vin2','unit_make2','unit_license2','unit_license_state2','unit_type_desc2']].forEach(function(fl){if(u[fl[0]])eq+='<tr><td>'+esc(u[fl[4]]||'')+'</td><td>'+esc(vinYear(u[fl[0]]))+'</td><td>'+esc(u[fl[1]]||'')+'</td><td>'+esc(u[fl[0]])+'</td><td>'+esc(((u[fl[3]]||'')+' '+(u[fl[2]]||'')).trim())+'</td><td>—</td></tr>';});});
        var vs=vByI[id]||[],dC=0,vC=0,hC=0;
        var vr=vs.map(function(v){var t=vType(v.part_no);if(t==='Vehicle')vC++;else if(t==='Hazmat')hC++;else dC++;var oy=String(v.out_of_service_indicator||'').toUpperCase()==='Y';return '<tr><td>'+t+'</td><td>'+esc(v.viol_desc)+'</td><td>Part: '+esc(v.part_no)+(v.part_no_section?' § '+esc(v.part_no_section):'')+'</td><td>'+(oy?'<span class="pill bad">OOS</span>':'<span class="pill warn">Warning</span>')+'</td></tr>';}).join('');
        var det='<div style="border:1px solid #e6edf5;border-top:0;border-radius:0 0 12px 12px;padding:14px 16px;margin-bottom:10px;background:#fbfdff">'
          +'<div style="font-weight:800;color:#123a6b;margin-bottom:8px">🚚 Inspected Equipment</div>'
          +(eq?'<table><thead><tr><th>Type</th><th>Year</th><th>Make</th><th>VIN</th><th>License</th><th>Decal</th></tr></thead><tbody>'+eq+'</tbody></table>':'<div style="color:#8aa0bd;font-size:.85rem">No equipment recorded for this inspection.</div>')
          +'<div style="font-weight:800;color:#123a6b;margin:14px 0 8px">⚠️ Violation Breakdown ('+vs.length+')</div>'
          +(vr?'<table><thead><tr><th>Type</th><th>Description</th><th>Part/Section</th><th>Status</th></tr></thead><tbody>'+vr+'</tbody></table><div class="big" style="grid-template-columns:repeat(3,1fr);margin-top:12px"><div class="m"><b>'+dC+'</b><span>DRIVER</span></div><div class="m"><b>'+vC+'</b><span>VEHICLE</span></div><div class="m"><b>'+hC+'</b><span>HAZMAT</span></div></div>':'<div style="color:#12a150;font-size:.85rem">✔ Clean inspection — no violations.</div>')
          +'</div>';
        return head+det;
      }).join('');
  }
  if(cur===5){
    var L1=insp.filter(function(x){return String(x.insp_level_id)==='1';}).length;
    var L2=insp.filter(function(x){return String(x.insp_level_id)==='2';}).length;
    var L3=insp.filter(function(x){return String(x.insp_level_id)==='3';}).length;
    return '<div class="sec-h">FMCSA Violation Summary</div><div class="big" style="grid-template-columns:repeat(3,1fr)">'
      +'<div class="m"><b>'+insp.length+'</b><span>TOTAL INSPECTIONS</span></div><div class="m"><b>'+A.totalViol+'</b><span>TOTAL VIOLATIONS</span></div><div class="m"><b>'+A.oosViol+'</b><span>OOS VIOLATIONS</span></div></div>'
      +'<div class="sec-h">Inspection Breakdown by Level</div><div class="big" style="grid-template-columns:repeat(5,1fr)">'
      +'<div class="m"><b>'+L1+'</b><span>LEVEL 1 (FULL)</span></div><div class="m"><b>'+L2+'</b><span>LEVEL 2 (WALK)</span></div><div class="m"><b>'+L3+'</b><span>LEVEL 3 (DRIVER)</span></div>'
      +'<div class="m"><b>'+A.vehInsp+'</b><span>VEHICLE INSP.</span></div><div class="m"><b>'+A.drvInsp+'</b><span>DRIVER INSP.</span></div></div>'
      +'<div class="sec-h">Violation Breakdown by BASIC Category</div><table><thead><tr><th>Category</th><th>Total Violations</th><th>OOS Violations</th><th>OOS Ratio</th></tr></thead><tbody>'
      +BCATS.map(function(b){var o=A.byCat[b];var ratio=o.total?(100*o.oos/o.total).toFixed(1):'0.0';return '<tr><td><b>'+b+'</b></td><td>'+o.total+'</td><td>'+(o.oos>0?'<span class="pill bad">'+o.oos+'</span>':'0')+'</td><td>'+ratio+'%</td></tr>';}).join('')+'</tbody></table>'
      +'<div class="sec-h" style="margin-top:18px">National Average OOS Rate Comparison</div><div class="cmp">'
      +'<div class="c"><span>VEHICLE OOS</span><b style="color:'+(A.vehRate>22.3?'#c62828':'#12a150')+'">'+A.vehRate.toFixed(1)+'%</b><div class="'+(A.vehRate>22.3?'above':'below')+'">Nat. avg 22.3% ('+(A.vehRate>22.3?'above':'below')+')</div></div>'
      +'<div class="c"><span>DRIVER OOS</span><b style="color:'+(A.drvRate>6.7?'#c62828':'#12a150')+'">'+A.drvRate.toFixed(1)+'%</b><div class="'+(A.drvRate>6.7?'above':'below')+'">Nat. avg 6.7% ('+(A.drvRate>6.7?'above':'below')+')</div></div>'
      +'<div class="c"><span>HAZMAT OOS</span><b>N/A</b><div style="color:#8aa0bd;font-size:.78rem">No hazmat inspections</div></div></div>';
  }
  if(cur===6){
    if(!crash.length)return '<div class="sec-h">Crashes</div><div class="empty">✅ No crash data found for this carrier in the last 24 months.</div>';
    return '<div class="sec-h">Crashes ('+crash.length+')</div><table><thead><tr><th>Date</th><th>State</th><th>Fatalities</th><th>Injuries</th><th>Tow</th><th>Report #</th></tr></thead><tbody>'
      +crash.slice(0,50).map(function(x){return '<tr><td>'+esc(d(x.report_date))+'</td><td>'+esc(x.report_state)+'</td><td>'+esc(x.fatalities||'0')+'</td><td>'+esc(x.injuries||'0')+'</td><td>'+(String(x.tow_away||'').toUpperCase()==='Y'?'Yes':'No')+'</td><td>'+esc(x.report_number)+'</td></tr>';}).join('')+'</tbody></table>';
  }
  return '';
}
document.getElementById('go').onclick=function(){cur=0;load(document.getElementById('dot').value);};
document.getElementById('dot').addEventListener('keydown',function(e){if(e.key==='Enter'){cur=0;load(this.value);}});
load('3761697');
