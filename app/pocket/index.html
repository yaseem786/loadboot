<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>LoadBoot · Carrier</title>
<!-- The Carrier Pocket app has merged into the single Carrier Portal at /app/carrier/.
     Redirect any old links, bookmarks, or installed PWA launches there. -->
<meta http-equiv="refresh" content="0; url=/app/carrier/">
<link rel="canonical" href="/app/carrier/">
<script>
// Best-effort: unregister the old pocket service worker so it stops serving the
// stale shell, then go to the unified carrier portal.
(function () {
  try {
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function (rs) {
        rs.forEach(function (r) { if ((r.scope || '').indexOf('/app/pocket/') >= 0) { try { r.unregister(); } catch (e) {} } });
      }).catch(function () {});
    }
  } catch (e) {}
  location.replace('/app/carrier/');
})();
</script>
</head>
<body>
<p style="font-family:system-ui,Arial,sans-serif;max-width:480px;margin:48px auto;padding:0 18px;text-align:center;color:#334155">
  The carrier app has moved. <a href="/app/carrier/">Open the Carrier Portal →</a>
</p>
</body>
</html>
