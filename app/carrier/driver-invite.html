<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<title>LoadBoot — Driver Invite</title>
<meta name="theme-color" content="#0F172A">
<link rel="icon" href="/favicon.ico?v=2">
<link rel="stylesheet" href="../shared/tokens.css">
<script src="../env-config.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&display=swap" rel="stylesheet">
<style>
  body{margin:0;background:radial-gradient(1100px 520px at 50% -10%,#13213f,#0b1220 62%,#070d1a);min-height:100vh;color:#e5edf8;font-family:Manrope,system-ui,Arial,sans-serif;display:flex;align-items:center;justify-content:center;padding:20px}
  .card{width:100%;max-width:420px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:26px 24px;box-shadow:0 30px 70px -30px rgba(2,12,30,.7)}
  h1{font-size:1.35rem;margin:0 0 4px}
  .sub{color:#93a4bd;font-size:.9rem;margin:0 0 18px;line-height:1.5}
  label{display:block;font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;color:#7cc0ff;font-weight:700;margin:12px 0 5px}
  input{width:100%;box-sizing:border-box;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.16);border-radius:11px;color:#fff;font-size:1rem;padding:12px 13px;outline:none}
  input:focus{border-color:#0883F7}
  .btn{width:100%;margin-top:16px;background:linear-gradient(135deg,#0883F7,#0967d2);color:#fff;border:0;border-radius:12px;padding:13px;font-weight:800;font-size:1rem;cursor:pointer;font-family:inherit}
  .btn.ghost{background:transparent;border:1px solid rgba(255,255,255,.2);margin-top:10px}
  .btn:disabled{opacity:.6;cursor:default}
  #msg{margin-top:12px;font-size:.86rem;line-height:1.5;min-height:1.2em}
  .feat{margin-top:16px;font-size:.8rem;color:#93a4bd;line-height:1.7}
  .brand{display:flex;align-items:center;gap:9px;margin-bottom:16px;font-weight:800;letter-spacing:.02em}
  .brand span{color:#FC5305}
</style>
</head>
<body>
<div class="card">
  <div class="brand">Load<span>Boot</span> · Driver</div>
  <h1>Join your carrier on LoadBoot</h1>
  <p class="sub">Your phone becomes your truck’s tracker. You’ll see only your assigned loads — check in/out with GPS, upload the POD, and report detention or lumper in one tap.</p>
  <div id="form">
    <label for="name">Your name</label>
    <input id="name" type="text" autocomplete="name" placeholder="Full name">
    <label for="email">Email</label>
    <input id="email" type="email" autocomplete="email" placeholder="you@email.com">
    <label for="pw">Password</label>
    <input id="pw" type="password" autocomplete="new-password" placeholder="8+ characters">
    <button class="btn" id="signupBtn">Create driver account &amp; join</button>
    <button class="btn ghost" id="signinBtn">I already have an account — sign in</button>
  </div>
  <div id="msg"></div>
  <div class="feat">✓ Only your assigned loads &nbsp; ✓ GPS check-in/out &nbsp; ✓ POD upload &nbsp; ✓ No paperwork</div>
</div>
<script type="module">
import { signUpDriver, signInWithPassword, getUser } from '../shared/session.js';
import { acceptDriverInvite } from '../shared/api.js';

const token = new URLSearchParams(location.search).get('t') || '';
const $ = (id) => document.getElementById(id);
function msg(t, ok) { const m = $('msg'); m.textContent = t; m.style.color = ok ? '#4ade80' : '#f87171'; }

async function finish() {
  msg('Joining your carrier…', true);
  try { await acceptDriverInvite(token); location.href = '/app/carrier/'; }
  catch (e) { msg((e && e.message) || 'Could not join — ask the carrier to resend the invite.'); }
}

async function init() {
  if (!token) { msg('This invite link is missing its code. Ask the carrier to resend it.'); $('form').style.display = 'none'; return; }
  try { const u = await getUser(); if (u) { finish(); } } catch (_) {}
}

$('signupBtn').onclick = async () => {
  const name = $('name').value.trim(), email = $('email').value.trim(), pw = $('pw').value;
  if (!email || pw.length < 8) { msg('Enter your email and a password of at least 8 characters.'); return; }
  $('signupBtn').disabled = true; msg('Creating your driver account…', true);
  try {
    const { data, error } = await signUpDriver(email, pw, token, { name });
    if (error) throw error;
    if (data && data.session) { await finish(); }
    else { msg('Check your email to confirm your address, then open this same link again to finish joining.', true); $('signupBtn').disabled = false; }
  } catch (e) { $('signupBtn').disabled = false; msg((e && e.message) || 'Sign up failed.'); }
};

$('signinBtn').onclick = async () => {
  const email = $('email').value.trim(), pw = $('pw').value;
  if (!email || !pw) { msg('Enter your email and password to sign in.'); return; }
  $('signinBtn').disabled = true; msg('Signing in…', true);
  try { const { error } = await signInWithPassword(email, pw); if (error) throw error; await finish(); }
  catch (e) { $('signinBtn').disabled = false; msg((e && e.message) || 'Sign in failed.'); }
};

init();
</script>
</body>
</html>
