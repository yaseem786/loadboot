<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<!-- Internal staff app: never index, never follow. -->
<meta name="robots" content="noindex,nofollow">
<title>LoadBoot Command Center</title>
<meta name="theme-color" content="#0F172A">
<link rel="icon" href="/favicon.ico?v=2">
<link rel="manifest" href="./command-center.webmanifest">
<link rel="apple-touch-icon" href="/apple-touch-icon.png?v=2">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="LB Command">
<link rel="stylesheet" href="/styles.css?v=6">
<link rel="stylesheet" href="../shared/tokens.css">
<link rel="stylesheet" href="./command-center.css">
<link rel="stylesheet" href="../shared/light-exec.css">
<!-- env-config.js is generated by build_site.py and sets window.__LB_ENV.
     It is loaded as a classic script BEFORE the module graph so ENV is ready. -->
<script src="../env-config.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&display=swap" rel="stylesheet">
</head>
<body>
<noscript><div class="lb-card" style="margin:40px auto;max-width:520px">The Command Center requires JavaScript.</div></noscript>
<!-- Premium opening splash (shown instantly; app.js fades it out once ready). -->
<div id="cc-splash" class="cc-splash">
  <div class="cc-splash-inner">
    <span class="cc-splash-glow" aria-hidden="true"></span>
    <span class="cc-splash-logowrap"><span class="cc-splash-lockup"><svg class="cc-splash-mark" viewBox="16 14 68 72" role="img" aria-label="LoadBoot"><path d="M16 14 H34 V68 H84 V86 H16 Z" fill="#FFFFFF"></path><path class="lbs-boot1" d="M34 14 H58 Q76 14 76 24 Q76 34 58 34 H34 Z" fill="#F97316"></path><path class="lbs-boot2" d="M34 40 H64 Q84 40 84 51 Q84 62 64 62 H34 Z" fill="#FFFFFF"></path></svg><img class="cc-splash-word" src="/logo-text-dark.png" alt="LoadBoot"></span></span>
    <div class="cc-splash-tagline">The Operating System for Trucking</div>
    <div class="cc-splash-tag">Command Center</div>
    <div class="cc-splash-bar"><i></i></div>
  </div>
</div>
<div id="lb-app" aria-busy="true">
  <div class="lb-state lb-loading" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:radial-gradient(1000px 520px at 50% 34%,#13213f 0%,#0b1220 62%,#070d1a 100%);z-index:9999">
    <style>
      @keyframes lbArw{0%{opacity:0;transform:translateX(-72px) scale(.78)}55%{opacity:1}100%{opacity:1;transform:translateX(0) scale(1)}}
      @keyframes lbWipe{0%{clip-path:inset(0 100% 0 0)}100%{clip-path:inset(0 0 0 0)}}
      @keyframes lbShine{0%{left:-45%}100%{left:135%}}
      @keyframes lbUp{0%{opacity:0;transform:translateY(10px)}100%{opacity:1;transform:translateY(0)}}
      @keyframes lbSlide{0%{transform:translateX(-120%)}100%{transform:translateX(330%)}}
    </style>
    <div style="display:flex;flex-direction:column;align-items:center;gap:22px">
      <div style="position:relative;display:flex;align-items:center;gap:14px;padding:8px 12px">
        <img src="/logo-icon-dark.png" alt="" style="height:64px;width:auto;display:block;filter:drop-shadow(0 14px 34px rgba(8,131,247,.5));animation:lbArw 1s cubic-bezier(.16,.9,.3,1.35) both">
        <img src="/logo-text-dark.png" alt="LoadBoot" style="height:46px;width:auto;display:block;clip-path:inset(0 100% 0 0);animation:lbWipe .7s .55s cubic-bezier(.4,0,.2,1) forwards">
        <span style="position:absolute;inset:0;overflow:hidden;pointer-events:none"><span style="content:'';position:absolute;top:-20%;bottom:-20%;left:-45%;width:32%;background:linear-gradient(100deg,transparent,rgba(255,255,255,.35),transparent);transform:skewX(-18deg);animation:lbShine 1.3s 1.15s ease-out both"></span></span>
      </div>
      <div style="font-size:.74rem;font-weight:700;letter-spacing:.26em;text-transform:uppercase;color:#64748b;opacity:0;animation:lbUp .6s 1s both;font-family:Manrope,system-ui,sans-serif">Command Center</div>
      <div style="width:170px;height:3px;border-radius:99px;background:rgba(255,255,255,.1);overflow:hidden">
        <div style="display:block;height:100%;width:40%;border-radius:99px;background:linear-gradient(90deg,#0883F7,#60a5fa);animation:lbSlide 1.1s ease-in-out infinite"></div>
      </div>
    </div>
  </div>
</div>
<script type="module" src="./app.js"></script>
</body>
</html>
