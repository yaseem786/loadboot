<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<!-- Internal staff app: never index, never follow. -->
<meta name="robots" content="noindex,nofollow">
<title>LoadBoot Command Center</title>
<meta name="theme-color" content="#0F172A">
<link rel="icon" href="/favicon.ico?v=2">
<link rel="manifest" href="./command-center.webmanifest">
<link rel="apple-touch-icon" href="/apple-touch-icon.png?v=2">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="LB Command">
<link rel="stylesheet" href="/styles.css?v=6">
<link rel="stylesheet" href="../shared/tokens.css">
<link rel="stylesheet" href="./command-center.css">
<!-- env-config.js is generated by build_site.py and sets window.__LB_ENV.
     It is loaded as a classic script BEFORE the module graph so ENV is ready. -->
<script src="../env-config.js"></script>
</head>
<body>
<noscript><div class="lb-card" style="margin:40px auto;max-width:520px">The Command Center requires JavaScript.</div></noscript>
<!-- Premium opening splash (shown instantly; app.js fades it out once ready). -->
<div id="cc-splash" class="cc-splash">
  <div class="cc-splash-inner">
    <span class="cc-splash-mark">
      <svg viewBox="0 0 56 56" width="46" height="46" fill="none" aria-hidden="true">
        <rect class="s1" x="17" y="13" width="7.5" height="30" rx="3.2" fill="#fff"/>
        <rect class="s2" x="17" y="35.5" width="15" height="7.5" rx="3.2" fill="#fff"/>
        <path class="s3" d="M32 30 L45 39 L32 48 Z" fill="#F97316"/>
      </svg>
    </span>
    <div class="cc-splash-word">Load<b>boot</b></div>
    <div class="cc-splash-tag">Command Center</div>
    <div class="cc-splash-bar"><i></i></div>
  </div>
</div>
<div id="lb-app" aria-busy="true"></div>
<script type="module" src="./app.js"></script>
</body>
</html>
