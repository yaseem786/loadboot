<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>LoadBoot — Sign in</title>
<!-- The old combined dashboard has been retired. Carriers now use the Carrier Portal
     (/app/carrier/); staff use the Command Center (/app/command-center/). This page
     redirects carriers to the new portal and offers staff a link to the Command Center. -->
<meta http-equiv="refresh" content="0; url=/app/carrier/">
<link rel="canonical" href="/app/carrier/">
<style>
  body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:#f6f8fc;color:#0f172a;margin:0}
  .wrap{max-width:440px;margin:14vh auto 0;padding:0 20px;text-align:center}
  .logo{font-weight:800;font-size:22px;letter-spacing:-.3px;margin-bottom:18px}
  .logo b{color:#f97316}
  .card{background:#fff;border:1px solid #e9eef5;border-radius:16px;padding:26px 20px}
  .btn{display:block;width:100%;box-sizing:border-box;padding:13px;border-radius:12px;background:#2563eb;color:#fff;font-weight:700;text-decoration:none;margin-top:6px}
  .staff{margin-top:18px;padding-top:14px;border-top:1px solid #e9eef5;font-size:13px;color:#64748b}
  .staff a{color:#2563eb;font-weight:700;text-decoration:none}
</style>
<script>location.replace('/app/carrier/');</script>
</head>
<body>
<div class="wrap">
  <div class="logo">Load<b>boot</b></div>
  <div class="card">
    <p style="margin:0 0 6px;font-weight:700">Taking you to the Carrier Portal…</p>
    <p style="margin:0 0 14px;color:#64748b;font-size:14px">If you’re not redirected automatically:</p>
    <a class="btn" href="/app/carrier/">Open the Carrier Portal →</a>
    <div class="staff">Staff member? <a href="/app/command-center/">Open the Command Center →</a></div>
  </div>
</div>
</body>
</html>
